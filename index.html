<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUNTER v14 매매일지</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px;--top:#a78bfa;--mid:#3b82f6;--bot:#22c55e;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:600px;margin:0 auto}
.hdr{text-align:center;padding:16px 0 10px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr .stats{font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:6px;color:var(--green);letter-spacing:1px;font-weight:700}
.tickers-bar{display:flex;gap:8px;overflow-x:auto;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.tickers-bar::-webkit-scrollbar{display:none}
.ticker-card{min-width:90px;padding:10px 12px;background:#2a2a3e;border-radius:10px;text-align:center;cursor:pointer;flex-shrink:0;user-select:none;position:relative}
.ticker-card.active{background:linear-gradient(135deg,#667eea,#764ba2)}
.tc-sym{font-weight:700;font-size:15px;color:#fff}
.tc-price{font-size:14px;color:#ffd;margin-top:3px;font-family:'JetBrains Mono',monospace;font-weight:700}
.tc-info{font-size:11px;color:#aaa;margin-top:2px}
.tc-del{position:absolute;top:3px;left:4px;width:16px;height:16px;background:rgba(239,68,68,0.85);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:0}
.ticker-card:hover .tc-del,.ticker-card.active .tc-del{opacity:1}
.ticker-add{min-width:46px;padding:8px;background:#2a2a3e;border:1px dashed #555;border-radius:10px;text-align:center;cursor:pointer;font-size:24px;color:#888;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.zone-bar{display:flex;gap:6px;margin-bottom:12px}
.zone-box{flex:1;padding:12px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-align:center;border:2px solid var(--border);background:var(--card);color:var(--dim);letter-spacing:1px}
.zone-box.on-top{border-color:var(--top);color:var(--top);box-shadow:0 0 20px rgba(167,139,250,0.4)}
.zone-box.on-mid{border-color:var(--mid);color:var(--mid);box-shadow:0 0 20px rgba(59,130,246,0.4)}
.zone-box.on-bot{border-color:var(--bot);color:var(--bot);box-shadow:0 0 20px rgba(34,197,94,0.4)}
.zone-box .pct{font-size:15px;margin-top:4px;font-weight:800}
.zone-box .rule{font-size:11px;margin-top:4px;opacity:0.8}
.tabs{display:flex;gap:3px;margin-bottom:12px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:11px;border:none;border-radius:8px;background:none;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.tab.on{background:var(--accent);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.ir{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ir label{font-size:14px;color:var(--dim);width:90px;font-weight:600}
.ir input,.ir select{flex:1;background:#0a0a0f;border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(--accent)}
.ir .u{font-size:14px;color:var(--dim);width:16px;font-weight:700}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'DM Sans',sans-serif}
.btn:active{transform:scale(0.97)}
.btn-b{background:var(--accent);color:#fff}
.btn-s{background:var(--red);color:#fff}
.btn-d{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.btn-r{background:#1a0a0a;color:var(--red);border:1px solid var(--red)}
.btn-g{background:#0a1a0a;color:var(--green);border:1px solid var(--green);font-size:13px;padding:11px}
.btn-fetch{background:#1a1a2a;color:var(--accent);border:1px solid var(--accent);font-size:14px;padding:12px}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f97316);color:#000;font-weight:800;font-size:15px;padding:14px}
.diary-table{width:100%;border-collapse:collapse;font-size:13px;font-family:'JetBrains Mono',monospace}
.diary-table th{background:var(--card2);color:var(--dim);font-size:11px;font-weight:700;padding:10px 5px;text-align:center;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.diary-table td{padding:10px 5px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-weight:600}
.diary-table tr:hover{background:#0a0a14}
.diary-table tr.today{background:rgba(59,130,246,0.08)}
.diary-table tr.today td{color:var(--accent);font-weight:800}
.cell-up{color:var(--green)}
.cell-dn{color:var(--red)}
.cell-2u{color:var(--green);font-weight:700}
.cell-4u{color:var(--red);font-weight:700}
.cell-zone-top{color:var(--top)}
.cell-zone-mid{color:var(--mid)}
.cell-zone-bot{color:var(--bot)}
.order-table{width:100%;border-collapse:collapse;font-size:14px;font-family:'JetBrains Mono',monospace;margin-top:6px}
.order-table th{background:#0a0a1a;color:var(--accent);font-size:12px;padding:12px 6px;text-align:center;border-bottom:1px solid var(--accent)}
.order-table td{padding:12px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-weight:700}
.order-table tr.buy-row{background:rgba(34,197,94,0.04)}
.order-table tr.sell-row{background:rgba(167,139,250,0.04)}
.order-table .act-buy{color:var(--green);font-weight:800}
.order-table .act-sell{color:var(--top);font-weight:800}
.order-table .price-cell{font-size:16px;font-weight:800}
.tier-table{width:100%;border-collapse:collapse;font-size:13px;font-family:'JetBrains Mono',monospace}
.tier-table th{background:var(--card2);color:var(--dim);font-size:11px;padding:10px 5px;text-align:center;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.tier-table td{padding:10px 5px;text-align:center;border-bottom:1px solid var(--border);font-weight:600}
.tier-table tr.empty{opacity:0.3}
.tier-table .pnl-up{color:var(--green);font-weight:700}
.tier-table .pnl-dn{color:var(--red);font-weight:700}
.start-box{background:linear-gradient(135deg,#0a0a1f,#0f0a1a);border:2px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:12px}
.start-box .title{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:1px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:18px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
.modal .desc{color:var(--dim);font-size:14px;margin-bottom:14px;line-height:1.6}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row .btn{margin-top:0}
.warn{background:#1a0a0a;border:1px solid var(--red);border-radius:10px;padding:14px;color:var(--red);font-weight:700;text-align:center;font-size:14px}
.danger-zone{background:#1a0a0a;border:2px dashed var(--red);border-radius:10px;padding:14px;margin-top:10px}
.danger-zone .title{color:var(--red);font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.sb-row .k{color:var(--dim)}
.sb-row .v{font-family:'JetBrains Mono',monospace;font-weight:700}
.note{background:#0a0a14;border-radius:8px;padding:12px;font-size:13px;color:var(--dim);line-height:1.7;margin-top:8px}
</style>
</head>
<body>
<div class="hdr">
  <h1><span id="ticker-name">SOXL</span> <span>HUNTER v14</span> 매매일지</h1>
  <div class="tickers-bar" id="tickers-bar"></div>

  <div style="background:linear-gradient(135deg,#1a1530,#2d1b4e);border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:10px;margin-bottom:12px">
    <div style="font-size:11px;color:#fbbf24;font-weight:800;letter-spacing:1px;margin-bottom:8px;text-align:center">⚡ 가상 시드 부스트</div>
    <div style="display:flex;gap:5px">
      <button id="bb-0" onclick="vSetBoost(0)" style="flex:1;background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 4px;cursor:pointer;font-family:'DM Sans',sans-serif">정상<br><span style="font-size:9px;opacity:0.85">0%</span></button>
      <button id="bb-5" onclick="vSetBoost(5)" style="flex:1;background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 4px;cursor:pointer;font-family:'DM Sans',sans-serif">+5%<br><span style="font-size:9px;opacity:0.85">안전</span></button>
      <button id="bb-10" onclick="vSetBoost(10)" style="flex:1;background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 4px;cursor:pointer;font-family:'DM Sans',sans-serif">+10%<br><span style="font-size:9px;opacity:0.85">보수</span></button>
      <button id="bb-15" onclick="vSetBoost(15)" style="flex:1;background:#a78bfa;color:#fff;border:1px solid #a78bfa;border-radius:8px;padding:10px 4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800">+15%<br><span style="font-size:9px;opacity:0.85">균형</span></button>
      <button id="bb-20" onclick="vSetBoost(20)" style="flex:1;background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 4px;cursor:pointer;font-family:'DM Sans',sans-serif">+20%<br><span style="font-size:9px;opacity:0.85">공격</span></button>
    </div>
  </div>
</div>
<div class="zone-bar">
  <div class="zone-box" id="zbox-top">천장<div class="pct">+2.5% / 7일</div><div class="rule">-10% 이내</div></div>
  <div class="zone-box" id="zbox-mid">중간<div class="pct">+0.5% / 7일</div><div class="rule">-10~-15%</div></div>
  <div class="zone-box" id="zbox-bot">바닥<div class="pct">+3% / 10일</div><div class="rule">-15% 이상</div></div>
</div>
<div class="tabs">
  <button class="tab on" id="tab-d" onclick="sw('d')">📋 주문</button>
  <button class="tab" id="tab-t" onclick="sw('t')">📦 보유</button>
  <button class="tab" id="tab-s" onclick="sw('s')">⚙️ 설정</button>
  <button class="tab" id="tab-h" onclick="sw('h')">📜 기록</button>
</div>
<div id="body"></div>
<a href="/bt.html" style="display:block;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;text-decoration:none;text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:15px;margin-top:14px;box-shadow:0 4px 16px rgba(249,115,22,0.3)">📊 백테스트 페이지로!</a>
<div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;margin-top:16px">HUNTER v14 매매일지 · 가상 시드 부스트</div>
<div id="modal-container"></div>
<script>
const TU=20,UP=2,DN=4,TOP_TH=-10,BOT_TH=-15;
const ZONES={top:{tp:0.025,fd:7,label:'천장'},mid:{tp:0.005,fd:7,label:'중간'},bot:{tp:0.030,fd:10,label:'바닥'}};
let tab='d';
let portfolios=JSON.parse(localStorage.getItem('v13-portfolios')||'null');
if(!portfolios){
  const v12=JSON.parse(localStorage.getItem('v12-portfolios')||'null');
  if(v12){
    portfolios={};
    for(const sym in v12){
      portfolios[sym]={seed:v12[sym].seed||100000,startDate:'',priceClose:v12[sym].priceClose||0,priceLive:v12[sym].priceLive||0,high20:v12[sym].high20||0,priceDate:v12[sym].priceDate||'',diary:[],pos:v12[sym].pos||[],hist:v12[sym].hist||[]};
    }
  }else{
    portfolios={SOXL:{seed:100000,startDate:'',priceClose:0,priceLive:0,high20:0,priceDate:'',diary:[],pos:[],hist:[]}};
  }
  localStorage.setItem('v13-portfolios',JSON.stringify(portfolios));
}
let activeSymbol=localStorage.getItem('v13-active')||'SOXL';
if(!portfolios[activeSymbol]){
  activeSymbol=Object.keys(portfolios)[0]||'SOXL';
  if(!portfolios[activeSymbol]){portfolios.SOXL={seed:100000,startDate:'',priceClose:0,priceLive:0,high20:0,priceDate:'',diary:[],pos:[],hist:[]};activeSymbol='SOXL';}
}
for(const sym in portfolios){
  const p=portfolios[sym];
  p.seed=Number(p.seed)||100000;p.startDate=p.startDate||'';p.priceClose=Number(p.priceClose)||0;p.priceLive=Number(p.priceLive)||0;p.high20=Number(p.high20)||0;p.priceDate=p.priceDate||'';
  p.diary=Array.isArray(p.diary)?p.diary:[];p.pos=Array.isArray(p.pos)?p.pos:[];p.hist=Array.isArray(p.hist)?p.hist:[];
}
const $=id=>document.getElementById(id);
const gv=id=>parseFloat($(id).value)||0;
const td=()=>new Date().toISOString().slice(0,10);
const curPort=()=>portfolios[activeSymbol];
const save=()=>{localStorage.setItem('v13-portfolios',JSON.stringify(portfolios));localStorage.setItem('v13-active',activeSymbol);};
const db=(a,b)=>{try{if(!a||!b)return 0;const d1=new Date(a),d2=new Date(b);if(isNaN(d1.getTime())||isNaN(d2.getTime()))return 0;let days=0,cur=new Date(d1);while(cur<d2){cur.setDate(cur.getDate()+1);if(cur.getDay()!==0&&cur.getDay()!==6)days++;}return days;}catch(e){return 0;}};
function getZoneFor(close,high20){if(!close||!high20)return 'top';const dd=(close-high20)/high20*100;if(dd>=TOP_TH)return 'top';if(dd<=BOT_TH)return 'bot';return 'mid';}
function getZone(){const p=curPort();return getZoneFor(p.priceClose,p.high20);}
function switchSymbol(sym){save();activeSymbol=sym;if(!portfolios[sym])portfolios[sym]={seed:100000,startDate:'',priceClose:0,priceLive:0,high20:0,priceDate:'',diary:[],pos:[],hist:[]};save();render();}
function addSymbol(){const sym=prompt('종목 코드:');if(!sym)return;const u=sym.toUpperCase().trim();if(!u)return;if(portfolios[u]){alert('이미 있음');return;}portfolios[u]={seed:100000,startDate:'',priceClose:0,priceLive:0,high20:0,priceDate:'',diary:[],pos:[],hist:[]};save();switchSymbol(u);}
function removeSymbol(sym){if(Object.keys(portfolios).length<=1){alert('최소 1개 필요');return;}if(!confirm(sym+' 삭제?'))return;delete portfolios[sym];save();if(sym===activeSymbol)activeSymbol=Object.keys(portfolios)[0];render();}
function renderTickers(){
  const bar=$('tickers-bar');if(!bar)return;
  const symCount=Object.keys(portfolios).length;
  let html='';
  for(const sym in portfolios){
    const p=portfolios[sym];
    const tierCount=p.pos.length;
    const totalU=p.pos.reduce((s,t)=>s+(t.u||0),0);
    const isActive=sym===activeSymbol;
    const delBtn=symCount>1?'<button class="tc-del" onclick="event.stopPropagation();removeSymbol(\''+sym+'\')">×</button>':'';
    html+='<div class="ticker-card '+(isActive?'active':'')+'" onclick="switchSymbol(\''+sym+'\')">'+delBtn+'<div class="tc-sym">'+sym+'</div><div class="tc-price">$'+(p.priceLive||p.priceClose||0).toFixed(2)+'</div><div class="tc-info">'+tierCount+'티어·'+totalU+'u</div></div>';
  }
  html+='<div class="ticker-add" onclick="addSymbol()">+</div>';
  bar.innerHTML=html;
  const tn=$('ticker-name');if(tn)tn.textContent=activeSymbol;
}
async function buildDiary(){
  const p=curPort();
  if(!p.startDate){alert('시작일을 설정하세요');return;}
  try{
    const start=new Date(p.startDate);start.setDate(start.getDate()-35);
    const fmt=d=>d.toISOString().slice(0,10);
    const res=await fetch('/api/history?symbol='+activeSymbol+'&start='+fmt(start)+'&end='+td());
    if(!res.ok){alert('API 오류 '+res.status);return;}
    const text=await res.text();
    let data;try{data=JSON.parse(text);}catch(e){alert('API 응답 오류');return;}
    if(data.error){alert('실패: '+data.error);return;}
    if(!data.bars||data.bars.length<21){alert('데이터 부족');return;}
    const startTs=new Date(p.startDate).getTime();
    let startIdx=-1;
    for(let i=0;i<data.bars.length;i++){if(new Date(data.bars[i].date).getTime()>=startTs){startIdx=i;break;}}
    if(startIdx<0){alert('시작일 데이터 없음');return;}
    const diary=[];
    for(let i=startIdx;i<data.bars.length;i++){
      const bar=data.bars[i];
      const prevBar=i>0?data.bars[i-1]:null;
      const start20=Math.max(0,i-19);
      const last20=data.bars.slice(start20,i+1);
      const high20=Math.max(...last20.map(b=>b.high));
      const vsPrev=prevBar?((bar.close-prevBar.close)/prevBar.close*100):0;
      const nextUnits=(prevBar&&bar.close<prevBar.close)?DN:UP;
      const zone=getZoneFor(bar.close,high20);
      diary.push({date:bar.date,close:+bar.close.toFixed(2),high20:+high20.toFixed(2),vsPrev:+vsPrev.toFixed(2),units:nextUnits,zone:zone});
    }
    p.diary=diary;
    if(diary.length>0){const last=diary[diary.length-1];p.priceClose=last.close;p.high20=last.high20;p.priceDate=last.date;}
    save();render();
    alert('✅ '+activeSymbol+' 매매일지 생성!\n\n📅 '+p.startDate+' ~ '+diary[diary.length-1].date+'\n📊 총 '+diary.length+'일\n💰 마지막 종가: $'+diary[diary.length-1].close);
  }catch(e){alert('실패: '+e.message);}
}
function setStartDate(){const dateEl=$('start-date-in');if(!dateEl)return;curPort().startDate=dateEl.value;save();render();}
function sw(t){tab=t;document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('on',['d','t','s','h'][i]===t);});render();}
function renderZones(){const z=getZone();['top','mid','bot'].forEach(x=>{const el=$('zbox-'+x);el.className=(x===z)?'zone-box on-'+x:'zone-box';});}
function render(){
  renderTickers();renderZones();
  const body=$('body');const p=curPort();let h='';
  if(tab==='d'){
    if(!p.startDate){
      h+='<div class="start-box"><div class="title">📅 매매 시작일 설정</div><div style="font-size:13px;color:var(--text);margin-bottom:10px">매매를 시작한 날짜를 정하세요. 그 날부터 매일 자동으로 종가/매수점이 기록됩니다.</div><div class="ir"><label>시작일</label><input type="date" id="start-date-in" value="'+td()+'" max="'+td()+'"><span class="u">📅</span></div><button class="btn btn-gold" onclick="setStartDate()">✨ 매매일지 시작</button></div>';
      body.innerHTML=h;return;
    }
    h+='<div class="card" style="border:1px solid var(--accent)"><div class="ct">📅 매매일지 ('+p.startDate+' ~)</div><div class="ir"><label>시작일</label><input type="date" id="start-date-in" value="'+p.startDate+'" max="'+td()+'" onchange="setStartDate()"><span class="u">📅</span></div><button class="btn btn-fetch" onclick="buildDiary()">🔄 야후에서 일지 갱신 (오늘까지)</button><div class="note">※ 시작일부터 오늘까지 모든 거래일 종가 + 20일 전고 + 다음날 유닛 자동 기록</div></div>';
    if(p.diary.length===0){

function updSeed(){const v=gv('seed-in');if(v>0)curPort().seed=v;save();render();}

function quickFillBuy(date,close,units){
  const p=curPort();
  if(p.pos.find(pp=>pp.d===date)){if(!confirm(date+'에 이미 매수 기록 있음. 추가로 더 기록할까요?'))return;}
  const diaryEntry=p.diary.find(d=>d.date===date);
  if(!diaryEntry)return alert('일지에 없는 날');
  const zone=diaryEntry.zone;
  const uw=p.seed/TU;
  const shares=Math.floor(units*uw/close);
  showModal('<h3>📈 '+date+' 체결 기록</h3><div class="desc">백테 기준: <b>$'+close+'</b> · '+units+'u<br>형님 실제 체결가가 다르면 수정하세요.<br><span style="color:var(--green)">매도점은 일지 종가 기준으로 고정됩니다 ($'+(close*(1+ZONES[zone].tp)).toFixed(2)+')</span></div><div class="ir"><label>매수 날짜</label><input type="date" id="qf-date" value="'+date+'"><span class="u">📅</span></div><div class="ir"><label>실제 체결가</label><input type="number" step="0.01" id="qf-price" value="'+close+'"><span class="u">$</span></div><div class="ir"><label>유닛</label><input type="number" id="qf-units" value="'+units+'" readonly style="background:#0a0a14;color:var(--accent)"><span class="u">u</span></div><div class="ir"><label>실제 주수</label><input type="number" id="qf-shares" value="'+shares+'"><span class="u">주</span></div><div class="note" style="margin-top:8px">💡 매도 LOC = <b style="color:var(--green)">$'+(close*(1+ZONES[zone].tp)).toFixed(2)+'</b> (일지 종가 기준 고정)<br>💡 형님이 다른 가격에 사도 매도점은 일지 기준 유지</div><div class="btn-row"><button class="btn btn-d" onclick="closeModal()">취소</button><button class="btn btn-b" onclick="confirmQuickFill(\''+date+'\','+close+',\''+zone+'\')">체결 기록</button></div>');
}
function confirmQuickFill(diaryDate,diaryClose,zone){
  const p=curPort();
  const actualPrice=parseFloat($('qf-price').value)||diaryClose;
  const actualShares=parseInt($('qf-shares').value);
  const actualDate=$('qf-date').value||diaryDate;
  const units=parseInt($('qf-units').value);
  if(!actualShares||actualShares<=0)return alert('주수 입력');
  if(!units)return alert('유닛 입력');
  p.pos.push({e:actualPrice,u:units,s:actualShares,d:actualDate,z:zone,diaryClose:diaryClose,diaryDate:diaryDate});
  p.hist.push({a:'B',d:actualDate,e:actualPrice,u:units,s:actualShares,z:zone,diaryClose:diaryClose,diaryDate:diaryDate});
  save();closeModal();
  const sellPoint=(diaryClose*(1+ZONES[zone].tp)).toFixed(2);
  alert('✅ T'+p.pos.length+' 체결 기록!\n\n매수: '+actualShares+'주 @ $'+actualPrice+'\n매도 LOC: $'+sellPoint+' (일지 기준 고정)');
  render();
}

  const v=gv('cp-live-quick');curPort().priceLive=v;save();

  const sp=parseFloat($('sell-price').value);
  const sd=$('sell-date').value;
  if(!sp||sp<=0)return alert('매도가');
  if(!sd)return alert('매도일');
  if(sd>td())return alert('미래 X');
  const pp=p.pos[idx];
  if(sd<pp.d)return alert('매수일('+pp.d+') 이후');
  const pnl=(sp-pp.e)/pp.e*100;
  const realized=(sp-pp.e)*pp.s;
  const oldSeed=p.seed;
  p.seed=Math.round(oldSeed+realized);
  p.hist.push({a:'S',d:sd,e:sp,u:pp.u,s:pp.s,z:pp.z,pnl:pnl,buyPrice:pp.e,realized:realized});
  p.pos.splice(idx,1);
  save();closeModal();
  alert('T'+(idx+1)+' 매도!\n'+pp.s+'주 @ $'+sp+'\n수익: '+(pnl>=0?'+':'')+pnl.toFixed(2)+'% ($'+realized.toFixed(0)+')\n💰 시드: $'+oldSeed.toLocaleString()+' → $'+p.seed.toLocaleString());
  render();
}
function promptSeedReset(){
  const p=curPort();
  showModal('<h3>💰 시드 재설정</h3><div class="desc">현재: <b>$'+p.seed.toLocaleString()+'</b></div><div class="ir"><label>새 시드</label><input type="number" id="new-seed" value="'+p.seed+'"><span class="u">$</span></div><div class="btn-row"><button class="btn btn-d" onclick="closeModal()">취소</button><button class="btn btn-b" onclick="applyManualSeed()">재설정</button></div>');
}
function applyManualSeed(){
  const p=curPort();
  const ns=parseFloat($('new-seed').value);
  if(!ns||ns<=0)return alert('금액');
  if(!confirm('$'+p.seed.toLocaleString()+' → $'+ns.toLocaleString()+'?'))return;
  p.seed=ns;save();closeModal();
  alert('재설정!\n$'+p.seed.toLocaleString());
  render();
}
function confirmFullReset(){
  const p=curPort();
  showModal('<h3 style="color:var(--red)">⚠️ '+activeSymbol+' 초기화</h3><div class="desc">'+activeSymbol+' 모든 데이터 삭제:<br>• 시드 → $100,000<br>• 일지 '+p.diary.length+'일<br>• 보유 '+p.pos.length+'개<br>• 기록 '+p.hist.length+'건<br><br><b>정말?</b></div><div class="btn-row"><button class="btn btn-d" onclick="closeModal()">취소</button><button class="btn btn-r" onclick="doFullReset()">💀 초기화</button></div>');
}
function doFullReset(){
  if(!confirm('마지막 확인'))return;
  portfolios[activeSymbol]={seed:100000,startDate:'',priceClose:0,priceLive:0,high20:0,priceDate:'',diary:[],pos:[],hist:[]};
  save();closeModal();alert('완료!');sw('d');
}
function showModal(html){$('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';}
function closeModal(){$('modal-container').innerHTML='';}

// === v14 가상 시드 부스트 (단순) ===
var vBoost = parseInt(localStorage.getItem(‘v14b’) || ‘15’);

function vSetBoost(pct) {
vBoost = pct;
localStorage.setItem(‘v14b’, pct);
vUpdateButtons();
render();
}

function vUpdateButtons() {
var ids = [0, 5, 10, 15, 20];
var colors = {0:’#666’, 5:’#22c55e’, 10:’#3b82f6’, 15:’#a78bfa’, 20:’#f97316’};
for (var i=0; i<ids.length; i++) {
var btn = document.getElementById(‘bb-’ + ids[i]);
if (!btn) continue;
if (ids[i] === vBoost) {
btn.style.background = colors[ids[i]];
btn.style.color = ‘#fff’;
btn.style.border = ’1px solid ’ + colors[ids[i]];
btn.style.fontWeight = ‘800’;
} else {
btn.style.background = ‘rgba(255,255,255,0.05)’;
btn.style.color = ‘#aaa’;
btn.style.border = ‘1px solid rgba(255,255,255,0.1)’;
btn.style.fontWeight = ‘400’;
}
}
}

function vGetEffSeed(seed, totalU) {
if (vBoost === 0) return seed;
if (totalU < 16) return seed * (1 + vBoost / 100);
if (totalU < 18) return seed * (1 + vBoost / 200);
return seed;
}

render();
vUpdateButtons();
</script>
