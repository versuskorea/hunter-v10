<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUNTER v12</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px;
  --top:#a78bfa;--mid:#3b82f6;--bot:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:500px;margin:0 auto}

.hdr{text-align:center;padding:20px 0 14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr .stats{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:6px;color:var(--green);letter-spacing:1px;font-weight:700}

.tickers-bar{display:flex;gap:8px;overflow-x:auto;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;margin-bottom:14px}
.tickers-bar::-webkit-scrollbar{display:none}
.ticker-card{min-width:85px;padding:10px 12px;background:#2a2a3e;border-radius:10px;text-align:center;cursor:pointer;flex-shrink:0;user-select:none;-webkit-user-select:none;position:relative}
.ticker-card.active{background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 12px rgba(102,126,234,0.4)}
.tc-sym{font-weight:700;font-size:14px;color:#fff}
.tc-price{font-size:13px;color:#ffd;margin-top:2px;font-family:'JetBrains Mono',monospace}
.tc-info{font-size:10px;color:#aaa;margin-top:2px}
.tc-del{position:absolute;top:2px;left:4px;width:16px;height:16px;background:rgba(239,68,68,0.85);color:#fff;border:none;border-radius:50%;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;opacity:0}
.ticker-card:hover .tc-del,.ticker-card.active .tc-del{opacity:1}
.ticker-add{min-width:50px;padding:8px;background:#2a2a3e;border:2px dashed #555;border-radius:10px;text-align:center;cursor:pointer;font-size:24px;font-weight:300;color:#888;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.zone-bar{display:flex;gap:6px;margin-bottom:14px}
.zone-box{flex:1;padding:14px 8px;border-radius:14px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-align:center;border:2px solid var(--border);background:var(--card);color:var(--dim);letter-spacing:1px;transition:all 0.3s}
.zone-box.on-top{border-color:var(--top);color:var(--top);box-shadow:0 0 30px rgba(167,139,250,0.5)}
.zone-box.on-mid{border-color:var(--mid);color:var(--mid);box-shadow:0 0 30px rgba(59,130,246,0.5)}
.zone-box.on-bot{border-color:var(--bot);color:var(--bot);box-shadow:0 0 30px rgba(34,197,94,0.5)}
.zone-box .pct{font-size:15px;margin-top:5px;font-weight:800}
.zone-box .rule{font-size:10px;margin-top:5px;opacity:0.8}

.status-card{background:linear-gradient(135deg,#0a0a0f,var(--card));border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.status-card .title{font-size:11px;color:var(--dim);letter-spacing:2px;font-weight:700;margin-bottom:12px}
.status-row{display:flex;justify-content:space-between;align-items:center;margin:7px 0}
.status-row .k{font-size:13px;color:var(--dim)}
.status-row .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800}
.zone-top{color:var(--top)}.zone-mid{color:var(--mid)}.zone-bot{color:var(--bot)}

.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--card);border-radius:14px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:11px;border:none;border-radius:11px;background:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,0.4)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700}

.ir{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ir label{font-size:13px;color:var(--dim);width:90px;font-weight:600}
.ir input{flex:1;background:#0a0a0f;border:2px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(--accent)}
.ir .u{font-size:13px;color:var(--dim);width:16px;font-weight:700}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn:active{transform:scale(0.97)}
.btn-b{background:var(--accent);color:#fff}
.btn-s{background:var(--red);color:#fff}
.btn-d{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.btn-r{background:#1a0a0a;color:var(--red);border:1px solid var(--red)}
.btn-seed{background:#0a1a0a;color:var(--green);border:1px solid var(--green);font-size:12px;padding:11px}
.btn-fetch{background:#1a1a2a;color:var(--accent);border:1px solid var(--accent);font-size:12px;padding:11px}

.date-fetch-box{background:linear-gradient(135deg,#0a0a1f,#0f0a1a);border:2px solid var(--accent);border-radius:14px;padding:14px;margin:12px 0}
.date-fetch-box .title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:1px}
.date-fetch-box .desc{font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5}

.loc-box{background:var(--card2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.loc-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px}
.order{border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.order.buy{background:#001a0f11;border-color:#22c55e33}
.order.sell-top{background:#1a0a1f11;border-left:3px solid var(--top)}
.order.sell-mid{background:#0a0a1f11;border-left:3px solid var(--mid)}
.order.sell-bot{background:#001a0f11;border-left:3px solid var(--bot)}
.order .lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px}
.order .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;margin-top:3px}
.order .desc{font-size:11px;color:var(--dim);margin-top:4px}

.tier-wrap{position:relative;overflow:hidden;margin-bottom:8px;border-radius:12px}
.tier-sell-bg{position:absolute;top:0;right:0;bottom:0;width:100%;background:linear-gradient(90deg,rgba(239,68,68,0.1),var(--red));display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:#fff;font-weight:800;font-family:'JetBrains Mono',monospace;font-size:14px}
.tier-sell-bg::before{content:"← 밀어서 매도"}
.tier-item{background:#0a0a0f;border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;touch-action:pan-y;transition:transform 0.2s;cursor:grab}
.tier-item.dragging{transition:none;cursor:grabbing}
.tier-item .top-row{display:flex;justify-content:space-between;align-items:center}
.tier-item .tid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:700}
.tier-item .info{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.tier-item .meta{font-size:11px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.tier-item .pnl{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.tier-item .pnl.up{color:var(--green)}
.tier-item .pnl.dn{color:var(--red)}
.tier-item.zone-top{border-left:3px solid var(--top)}
.tier-item.zone-mid{border-left:3px solid var(--mid)}
.tier-item.zone-bot{border-left:3px solid var(--bot)}
.tier-sell-btn{background:var(--red);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:8px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
.modal .desc{color:var(--dim);font-size:13px;margin-bottom:16px;line-height:1.6}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row .btn{margin-top:0}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.sb{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sb .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.sb .l{font-size:10px;color:var(--dim);margin-top:2px;font-weight:600}

.warn{background:#1a0a0a;border:1px solid var(--red);border-radius:12px;padding:14px;color:var(--red);font-weight:700;text-align:center;font-size:13px}
.danger-zone{background:#1a0a0a;border:2px dashed var(--red);border-radius:12px;padding:14px;margin-top:12px}
.danger-zone .title{color:var(--red);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.footer{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;margin-top:20px}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:6px">
    <a href="/bt.html" style="background:#1a1a2e;color:#f97316;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:11px;font-weight:700;border:1px solid #333">📊 백테 →</a>
  </div>
  <h1><span id="ticker-name">SOXL</span> <span>HUNTER</span> v12</h1>
  <div class="tickers-bar" id="tickers-bar"></div>
  <div class="stats">v8 깔끔 스타일 + 날짜별 가격 조회</div>
</div>

<div class="zone-bar">
  <div class="zone-box" id="zbox-top">천장<div class="pct" id="zp-top">+2.5% / 7일</div><div class="rule">-10% 이내</div></div>
  <div class="zone-box" id="zbox-mid">중간<div class="pct" id="zp-mid">+0.5% / 7일</div><div class="rule">-10~-15%</div></div>
  <div class="zone-box" id="zbox-bot">바닥<div class="pct" id="zp-bot">+3% / 10일</div><div class="rule">-15% 이상</div></div>
</div>

<div class="status-card">
  <div class="title">📊 현재 상태</div>
  <div id="status-body"></div>
</div>

<div class="tabs">
  <button class="tab" id="tab-m" onclick="sw('m')">매매</button>
  <button class="tab on" id="tab-t" onclick="sw('t')">티어</button>
  <button class="tab" id="tab-h" onclick="sw('h')">기록</button>
  <button class="tab" id="tab-g" onclick="sw('g')">가이드</button>
</div>

<div id="body"></div>

<div class="footer">HUNTER v12 · 단순함 = 정답</div>
<div id="modal-container"></div>

<script>
// ========== 설정 ==========
const TU = 20, UP = 2, DN = 4, TOP_TH = -10, BOT_TH = -15;
const ZONES = {
  top: {tp:0.025, fd:7, label:'천장'},
  mid: {tp:0.005, fd:7, label:'중간'},
  bot: {tp:0.030, fd:10, label:'바닥'}
};

// ========== 상태 ==========
let tab = 't';

// v11 데이터 마이그레이션
let portfolios = JSON.parse(localStorage.getItem('v12-portfolios') || 'null');
if (!portfolios) {
  const v11 = JSON.parse(localStorage.getItem('v11-portfolios') || 'null');
  if (v11) {
    portfolios = {};
    for (const sym in v11) {
      portfolios[sym] = {
        seed: v11[sym].seed || 100000,
        priceClose: v11[sym].price || 0,    // 전날 종가 (LOC 계산용)
        priceLive: v11[sym].priceLive || 0, // 실시간 현재가 (손익 표시용)
        high20: v11[sym].high20 || 0,
        priceDate: v11[sym].priceDate || '',
        pos: v11[sym].pos || [],
        hist: v11[sym].hist || []
      };
    }
  } else {
    portfolios = { SOXL: { seed:100000, priceClose:0, priceLive:0, high20:0, priceDate:'', pos:[], hist:[] } };
  }
  localStorage.setItem('v12-portfolios', JSON.stringify(portfolios));
}

let activeSymbol = localStorage.getItem('v12-active') || 'SOXL';
if (!portfolios[activeSymbol]) {
  activeSymbol = Object.keys(portfolios)[0] || 'SOXL';
  if (!portfolios[activeSymbol]) {
    portfolios.SOXL = { seed:100000, priceClose:0, priceLive:0, high20:0, priceDate:'', pos:[], hist:[] };
    activeSymbol = 'SOXL';
  }
}

// 모든 포트폴리오 검증
for (const sym in portfolios) {
  const p = portfolios[sym];
  p.seed = Number(p.seed) || 100000;
  p.priceClose = Number(p.priceClose) || 0;
  p.priceLive = Number(p.priceLive) || 0;
  p.high20 = Number(p.high20) || 0;
  p.priceDate = p.priceDate || '';
  p.pos = Array.isArray(p.pos) ? p.pos : [];
  p.hist = Array.isArray(p.hist) ? p.hist : [];
}

const $ = id => document.getElementById(id);
const gv = id => parseFloat($(id).value) || 0;
const td = () => new Date().toISOString().slice(0,10);
const curPort = () => portfolios[activeSymbol];

const save = () => {
  localStorage.setItem('v12-portfolios', JSON.stringify(portfolios));
  localStorage.setItem('v12-active', activeSymbol);
};

const db = (a,b) => {
  try {
    if (!a || !b) return 0;
    const d1=new Date(a), d2=new Date(b);
    if (isNaN(d1.getTime()) || isNaN(d2.getTime())) return 0;
    let days=0, cur=new Date(d1);
    while(cur<d2) { cur.setDate(cur.getDate()+1); if(cur.getDay()!==0&&cur.getDay()!==6) days++; }
    return days;
  } catch(e) { return 0; }
};

function getZone() {
  const p = curPort();
  if (!p.priceClose || !p.high20) return 'top';
  const dd = (p.priceClose - p.high20) / p.high20 * 100;
  if (dd >= TOP_TH) return 'top';
  if (dd <= BOT_TH) return 'bot';
  return 'mid';
}

function zoneDesc() {
  const z = getZone();
  const p = curPort();
  const dd = p.high20 ? ((p.priceClose - p.high20)/p.high20*100).toFixed(1) : 0;
  return { zone: z, dd: dd, label: ZONES[z].label };
}

// ========== 종목 관리 ==========
function switchSymbol(sym) {
  save(); activeSymbol = sym;
  if (!portfolios[sym]) portfolios[sym] = { seed:100000, priceClose:0, priceLive:0, high20:0, priceDate:'', pos:[], hist:[] };
  save(); render();
}

function addSymbol() {
  const sym = prompt('종목 코드 입력 (예: UCO, TSLA):');
  if (!sym) return;
  const u = sym.toUpperCase().trim();
  if (!u) return;
  if (portfolios[u]) { alert('이미 있는 종목!'); return; }
  portfolios[u] = { seed:100000, priceClose:0, priceLive:0, high20:0, priceDate:'', pos:[], hist:[] };
  save(); switchSymbol(u);
}

function removeSymbol(sym) {
  if (Object.keys(portfolios).length <= 1) { alert('최소 1개 종목은 필요!'); return; }
  if (!confirm(`${sym} 삭제? 모든 데이터 사라집니다!`)) return;
  delete portfolios[sym];
  save();
  if (sym === activeSymbol) {
    activeSymbol = Object.keys(portfolios)[0];
  }
  render();
}

function renderTickers() {
  const bar = $('tickers-bar');
  if (!bar) return;
  const symCount = Object.keys(portfolios).length;
  let html = '';
  for (const sym in portfolios) {
    const p = portfolios[sym];
    const tierCount = p.pos.length;
    const totalU = p.pos.reduce((s,t) => s+(t.u||0), 0);
    const isActive = sym === activeSymbol;
    const delBtn = symCount > 1 ? `<button class="tc-del" onclick="event.stopPropagation();removeSymbol('${sym}')">×</button>` : '';
    html += `<div class="ticker-card ${isActive?'active':''}" onclick="switchSymbol('${sym}')">
      ${delBtn}
      <div class="tc-sym">${sym}</div>
      <div class="tc-price">$${(p.priceLive||p.priceClose||0).toFixed(2)}</div>
      <div class="tc-info">${tierCount}티어 · ${totalU}u</div>
    </div>`;
  }
  html += `<div class="ticker-add" onclick="addSymbol()">+</div>`;
  bar.innerHTML = html;
  const tn = $('ticker-name');
  if (tn) tn.textContent = activeSymbol;
}

// ========== 탭/렌더 ==========
function sw(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('on', ['m','t','h','g'][i]===t);
  });
  render();
}

function renderZones() {
  const z = getZone();
  ['top','mid','bot'].forEach(x => {
    const el = $('zbox-'+x);
    el.className = (x===z) ? 'zone-box on-'+x : 'zone-box';
  });
}

function renderStatus() {
  const z = zoneDesc();
  const p = curPort();
  const uw = p.seed/TU;
  const ti = p.pos.reduce((a,pp) => a+(pp.u||0), 0);
  const livePrice = p.priceLive || p.priceClose || 0;
  
  let h = `
    <div class="status-row"><span class="k">시드</span><span class="v">$${p.seed.toLocaleString()}</span></div>
    <div class="status-row"><span class="k">유닛 단위</span><span class="v">$${uw.toFixed(0)}</span></div>
    <div class="status-row"><span class="k">전날 종가 ${p.priceDate?'('+p.priceDate+')':''}</span><span class="v">$${p.priceClose||'--'}</span></div>
    <div class="status-row"><span class="k">실시간 현재가</span><span class="v" style="color:var(--accent)">$${livePrice||'--'}</span></div>
    <div class="status-row"><span class="k">20일 전고</span><span class="v">$${p.high20||'--'}</span></div>
    <div class="status-row"><span class="k">전고 대비</span><span class="v zone-${z.zone}">${z.dd>0?'+':''}${z.dd}%</span></div>
    <div class="status-row"><span class="k">구간</span><span class="v zone-${z.zone}">${z.label} 🎯</span></div>
    <div class="status-row"><span class="k">투입 유닛</span><span class="v">${ti}/${TU} (${TU-ti}u 남음)</span></div>
  `;
  $('status-body').innerHTML = h;
}

let activeInputId = null, activeInputCursor = 0;
function saveActiveInput() {
  const ae = document.activeElement;
  if (ae && ae.tagName === 'INPUT') {
    activeInputId = ae.id;
    activeInputCursor = ae.selectionStart;
  } else activeInputId = null;
}
function restoreActiveInput() {
  if (activeInputId) {
    const el = $(activeInputId);
    if (el) {
      el.focus();
      try { if (el.type !== 'number' && el.type !== 'date') el.setSelectionRange(activeInputCursor, activeInputCursor); } catch(e) {}
    }
  }
}

function render() {
  saveActiveInput();
  renderTickers();
  renderZones();
  renderStatus();
  
  const body = $('body');
  const p = curPort();
  let h = '';
  
  if (tab === 'm') {
    const z = zoneDesc();
    const ti = p.pos.reduce((a,pp) => a+pp.u, 0);
    const rem = TU - ti;
    const uw = p.seed/TU;
    
    // 설정 카드 (v8 깔끔 스타일)
    h += `<div class="card">
      <div class="ct">설정</div>
      <div class="ir"><label>시드</label><input type="number" id="seed-in" value="${p.seed}" onchange="updSeed()"><span class="u">$</span></div>
      
      <div class="date-fetch-box">
        <div class="title">📅 날짜로 가격 조회</div>
        <div class="ir"><label>기준일</label><input type="date" id="fetch-date" value="${p.priceDate||td()}" max="${td()}"><span class="u">📅</span></div>
        <button class="btn btn-fetch" onclick="fetchByDate()" style="margin-top:8px">🔍 해당 날짜 종가 + 20일 전고 가져오기</button>
        <div class="desc">
          ※ 선택한 날짜의 확정 종가 + 그 시점 20일 전고를 자동 입력<br>
          ※ 매매 빠진 날도 보정 가능. 기본값 = 오늘
        </div>
      </div>
      
      <div class="ir"><label>전날 종가</label><input type="number" step="0.01" id="cp" value="${p.priceClose||''}" onchange="updPriceClose()"><span class="u">$</span></div>

// ========== 날짜로 가격 조회 ==========
async function fetchByDate() {
  const dateEl = $('fetch-date');
  if (!dateEl || !dateEl.value) return alert('날짜를 선택하세요');
  const targetDate = dateEl.value;
  
  try {
    const end = new Date(targetDate);
    const start = new Date(end);
    start.setDate(start.getDate() - 35);
    const fmt = d => d.toISOString().slice(0,10);
    
    const res = await fetch(`/api/history?symbol=${activeSymbol}&start=${fmt(start)}&end=${targetDate}`);
    
    if (!res.ok) {
      alert(`API 오류 (${res.status})\n\n수동으로 입력하세요.`);
      return;
    }
    
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) {
      alert(`API 응답 오류\n\n수동 입력하세요.`);
      return;
    }
    
    if (data.error) { alert('실패: '+data.error); return; }
    if (!data.bars || data.bars.length < 21) { alert('데이터 부족 (21일 이상 필요)'); return; }
    
    // 타겟 날짜의 종가 (또는 가장 가까운 거래일)
    const targetTs = new Date(targetDate).getTime();
    let targetIdx = -1;
    for (let i = data.bars.length-1; i>=0; i--) {
      if (new Date(data.bars[i].date).getTime() <= targetTs) { targetIdx = i; break; }
    }
    
    if (targetIdx < 0) { alert('해당 날짜 데이터 없음'); return; }
    
    const targetBar = data.bars[targetIdx];
    const start20 = Math.max(0, targetIdx - 19);
    const last20 = data.bars.slice(start20, targetIdx + 1);
    const high20 = Math.max(...last20.map(b => b.high));
    
    const p = curPort();
    p.priceClose = +targetBar.close.toFixed(2);
    p.high20 = +high20.toFixed(2);
    p.priceDate = targetBar.date;
    save();
    render();
    
    const zL = { top:'천장', mid:'중간', bot:'바닥' };
    alert(`✅ ${activeSymbol} 가격 업데이트\n\n` +
          `📅 날짜: ${targetBar.date}${targetBar.date !== targetDate ? ' (요청: '+targetDate+')' : ''}\n` +
          `💰 종가: $${p.priceClose}\n` +
          `📈 20일 전고: $${p.high20}\n` +
          `🎯 구간: ${zL[getZone()]}`);
  } catch(e) {
    alert('가져오기 실패: ' + e.message + '\n\n수동 입력하세요.');
  }
}

// ========== 매수 ==========
let manualUnitOverride = false;

function highlightUnitButtons() {
  const btnAuto = $('btn-u-auto'), btnUp = $('btn-u-up'), btnDn = $('btn-u-dn');
  if (!btnAuto || !btnUp || !btnDn) return;
  [btnAuto, btnUp, btnDn].forEach(b => {
    b.style.background = 'var(--card2)';
    b.style.color = 'var(--dim)';
    b.style.border = '1px solid var(--border)';
  });
  if (!manualUnitOverride) {
    btnAuto.style.background = 'var(--accent)';
    btnAuto.style.color = '#fff';
  } else {
    const fu = gv('fu');
    if (fu === DN) { btnDn.style.background = 'var(--red)'; btnDn.style.color='#fff'; }
    else if (fu === UP) { btnUp.style.background = 'var(--green)'; btnUp.style.color='#fff'; }
  }
}

function upFillAuto() {
  const p = curPort();
  const fp = gv('fp');
  if (!fp) {
    $('fs').value = '';
    $('fi').innerHTML = '';
    if (!manualUnitOverride) $('fu').value = UP;
    highlightUnitButtons();
    return;
  }
  
  let fu, autoDetected = '';
  if (manualUnitOverride) {
    fu = gv('fu') || UP;
    autoDetected = ` <span style="color:var(--accent)">⚙️ 수동 ${fu}u</span>`;
  } else if (p.priceClose && fp < p.priceClose) {
    fu = DN; $('fu').value = DN;
    const dropPct = ((fp - p.priceClose) / p.priceClose * 100).toFixed(1);
    autoDetected = ` <span style="color:var(--red)">🔻 하락일 (${dropPct}%)</span>`;
  } else if (p.priceClose && fp >= p.priceClose) {
    fu = UP; $('fu').value = UP;
    const upPct = ((fp - p.priceClose) / p.priceClose * 100).toFixed(1);
    autoDetected = ` <span style="color:var(--green)">🔺 상승일 (+${upPct}%)</span>`;
  } else {
    fu = gv('fu') || UP;
    autoDetected = ' <span style="color:var(--dim)">(전날 종가 미입력)</span>';
  }
  
  const uw = p.seed/TU;
  const sharesInput = $('fs');
  const sharesAlreadyManual = sharesInput && sharesInput.value && document.activeElement === sharesInput;
  if (!sharesAlreadyManual) $('fs').value = Math.floor(fu * uw / fp);
  
  const finalShares = gv('fs');
  const z = zoneDesc();
  const pz = ZONES[z.zone];
  const sell = (fp * (1+pz.tp)).toFixed(2);
  
  const prevInfo = p.priceClose ? `전날 $${p.priceClose} → 체결 $${fp}${autoDetected}<br>` :
    `<span style="color:var(--accent)">⚠️ 전날 종가 미입력 - 유닛 수동 선택</span>${autoDetected}<br>`;
  
  $('fi').innerHTML = `${prevInfo}
    유닛당 $${uw.toFixed(0)} · <b>${fu}u</b> = $${(fu*uw).toFixed(0)} · <b style="color:var(--green)">${finalShares}주</b><br>
    구간: <b style="color:var(--${z.zone})">${pz.label}</b> · 매도 LOC <b>$${sell}</b> (+${(pz.tp*100).toFixed(2)}%) · 강제 ${pz.fd}일`;
  
  highlightUnitButtons();
}

function setUnit(u) { manualUnitOverride=true; $('fu').value=u; upFillAuto(); }
function resetUnitAuto() { manualUnitOverride=false; upFillAuto(); }
function onUnitManualChange() { manualUnitOverride=true; upFillAuto(); }

function doBuy() {
  const p = curPort();
  const fp = gv('fp'), fu = gv('fu'), fs = gv('fs');
  const fdEl = $('fd');
  const fd = fdEl ? fdEl.value : td();
  
  if (!fp) return alert('체결가를 입력하세요!');
  if (!fu) return alert('유닛을 선택하세요!');
  if (!fs) return alert('주수를 확인하세요!');
  if (!fd) return alert('체결일을 입력하세요!');
  if (fd > td()) return alert('미래 날짜는 입력 X!');
  
  const z = getZone();
  p.pos.push({e:fp, u:fu, s:fs, d:fd, z:z});
  p.hist.push({a:'B', d:fd, e:fp, u:fu, s:fs, z:z});
  save();
  
  const zL = { top:'천장', mid:'중간', bot:'바닥' };
  const daysAgo = db(fd, td());
  alert(`T${p.pos.length} 기록!\n${fs}주 @ $${fp} (${zL[z]}, ${fu}u)${daysAgo>0?'\n📅 '+daysAgo+'일 전':''}`);
  sw('t');
}

// ========== 매도 ==========
function promptSell(idx) {
  const p = curPort();
  const pp = p.pos[idx];
  const pz = ZONES[pp.z];
  const defaultPrice = (pp.e * (1+pz.tp)).toFixed(2);
  
  showModal(`
    <h3>T${idx+1} 매도</h3>
    <div class="desc">매수가 <b>$${pp.e}</b> · ${pp.s}주 · ${pz.label} · ${pp.d}<br>
      추천: <b style="color:var(--green)">$${defaultPrice}</b> (+${(pz.tp*100).toFixed(2)}%)</div>
    <div class="ir"><label>매도가</label><input type="number" step="0.01" id="sell-price" value="${defaultPrice}"><span class="u">$</span></div>
    <div class="ir"><label>매도일</label><input type="date" id="sell-date" value="${td()}" min="${pp.d}"><span class="u">📅</span></div>
    <div class="btn-row">
      <button class="btn btn-d" onclick="closeModal()">취소</button>
      <button class="btn btn-s" onclick="doSell(${idx})">매도!</button>
    </div>
  `);
}

function doSell(idx) {
  const p = curPort();
  const sellPrice = parseFloat($('sell-price').value);
  const sellDateEl = $('sell-date');
  const sellDate = sellDateEl ? sellDateEl.value : td();
  
  if (!sellPrice || sellPrice <= 0) return alert('매도가 입력');
  if (!sellDate) return alert('매도일 입력');
  if (sellDate > td()) return alert('미래 X');
  
  const pp = p.pos[idx];
  if (sellDate < pp.d) return alert(`매도일은 매수일(${pp.d}) 이후`);
  
  const pnl = (sellPrice - pp.e) / pp.e * 100;
  const realized = (sellPrice - pp.e) * pp.s;
  
  // 시드 자동 갱신 (복리)
  const oldSeed = p.seed;
  p.seed = Math.round(oldSeed + realized);
  
  p.hist.push({a:'S', d:sellDate, e:sellPrice, u:pp.u, s:pp.s, z:pp.z, pnl:pnl, buyPrice:pp.e, realized:realized});
  p.pos.splice(idx, 1);
  save();
  closeModal();
  
  const daysAgo = db(sellDate, td());
  alert(`T${idx+1} 매도!\n${pp.s}주 @ $${sellPrice}\n수익: ${pnl>=0?'+':''}${pnl.toFixed(2)}% ($${realized.toFixed(0)})\n\n💰 시드: $${oldSeed.toLocaleString()} → $${p.seed.toLocaleString()}${daysAgo>0?'\n📅 '+daysAgo+'일 전':''}`);
  render();
}

function promptSeedReset() {
  const p = curPort();
  showModal(`
    <h3>💰 시드 재설정</h3>
    <div class="desc">현재: <b>$${p.seed.toLocaleString()}</b><br><small style="color:var(--red)">⚠️ 유닛 크기 변경됩니다</small></div>
    <div class="ir"><label>새 시드</label><input type="number" id="new-seed" value="${p.seed}"><span class="u">$</span></div>
    <div class="btn-row">
      <button class="btn btn-d" onclick="closeModal()">취소</button>
      <button class="btn btn-b" onclick="applyManualSeed()">재설정</button>
    </div>
  `);
}

function applyManualSeed() {
  const p = curPort();
  const ns = parseFloat($('new-seed').value);
  if (!ns || ns <= 0) return alert('금액 입력');
  if (!confirm(`$${p.seed.toLocaleString()} → $${ns.toLocaleString()}?`)) return;
  p.seed = ns;
  save(); closeModal();
  alert(`재설정 완료!\n$${p.seed.toLocaleString()}`);
  render();
}

function confirmFullReset() {
  const p = curPort();
  showModal(`
    <h3 style="color:var(--red)">⚠️ ${activeSymbol} 초기화</h3>
    <div class="desc">${activeSymbol} 데이터 영구 삭제:<br>
      • 시드 → $100,000<br>
      • 가격/전고<br>
      • 보유 ${p.pos.length}개<br>
      • 기록 ${p.hist.length}건<br><br>
      <b>정말?</b>
    </div>
    <div class="btn-row">
      <button class="btn btn-d" onclick="closeModal()">취소</button>
      <button class="btn btn-r" onclick="doFullReset()">💀 초기화</button>
    </div>
  `);
}

function doFullReset() {
  if (!confirm('마지막 확인: 정말?')) return;
  portfolios[activeSymbol] = { seed:100000, priceClose:0, priceLive:0, high20:0, priceDate:'', pos:[], hist:[] };
  save(); closeModal();
  alert('초기화 완료!');
  sw('t');
}

// ========== 모달 ==========
function showModal(html) {
  $('modal-container').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { $('modal-container').innerHTML = ''; }

// ========== 슬라이드 매도 ==========
let swipeState = {startX:0, currentX:0, idx:null, el:null};

function touchStart(e, idx) {
  swipeState.startX = e.touches[0].clientX;
  swipeState.idx = idx; swipeState.el = e.currentTarget;
  swipeState.el.classList.add('dragging');
}
function touchMove(e, idx) {
  if (swipeState.idx !== idx) return;
  swipeState.currentX = e.touches[0].clientX;
  const dx = swipeState.currentX - swipeState.startX;
  if (dx < 0) swipeState.el.style.transform = `translateX(${Math.max(dx,-200)}px)`;
}
function touchEnd(e, idx) {
  if (swipeState.idx !== idx) return;
  const dx = swipeState.currentX - swipeState.startX;
  swipeState.el.classList.remove('dragging');
  swipeState.el.style.transform = '';
  if (dx < -100) promptSell(idx);
  swipeState = {startX:0, currentX:0, idx:null, el:null};
}
function mouseStart(e, idx) {
  if (e.target.tagName === 'BUTTON') return;
  swipeState.startX = e.clientX; swipeState.idx = idx; swipeState.el = e.currentTarget;
  swipeState.el.classList.add('dragging');
  const onMove = ev => {
    swipeState.currentX = ev.clientX;
    const dx = ev.clientX - swipeState.startX;
    if (dx < 0) swipeState.el.style.transform = `translateX(${Math.max(dx,-200)}px)`;
  };
  const onUp = () => {
    const dx = swipeState.currentX - swipeState.startX;
    if (swipeState.el) { swipeState.el.classList.remove('dragging'); swipeState.el.style.transform = ''; }
    if (dx < -100) promptSell(idx);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    swipeState = {startX:0, currentX:0, idx:null, el:null};
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

render();
</script>
