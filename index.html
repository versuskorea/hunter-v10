<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUNTER v13 매매일지</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px;
  --top:#a78bfa;--mid:#3b82f6;--bot:#22c55e;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:600px;margin:0 auto}

.hdr{text-align:center;padding:16px 0 10px}
.hdr h1{font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:3px;color:#fff}
.hdr h1 span{color:var(–accent)}
.hdr .stats{font-family:‘JetBrains Mono’,monospace;font-size:10px;margin-top:4px;color:var(–green);letter-spacing:1px;font-weight:700}

.tickers-bar{display:flex;gap:6px;overflow-x:auto;padding:6px 8px;background:var(–card2);border:1px solid var(–border);border-radius:10px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tickers-bar::-webkit-scrollbar{display:none}
.ticker-card{min-width:75px;padding:8px 10px;background:#2a2a3e;border-radius:8px;text-align:center;cursor:pointer;flex-shrink:0;user-select:none;position:relative}
.ticker-card.active{background:linear-gradient(135deg,#667eea,#764ba2)}
.tc-sym{font-weight:700;font-size:13px;color:#fff}
.tc-price{font-size:11px;color:#ffd;margin-top:2px;font-family:‘JetBrains Mono’,monospace}
.tc-info{font-size:9px;color:#aaa;margin-top:1px}
.tc-del{position:absolute;top:2px;left:3px;width:14px;height:14px;background:rgba(239,68,68,0.85);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:0}
.ticker-card:hover .tc-del,.ticker-card.active .tc-del{opacity:1}
.ticker-add{min-width:40px;padding:6px;background:#2a2a3e;border:1px dashed #555;border-radius:8px;text-align:center;cursor:pointer;font-size:20px;color:#888;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.zone-bar{display:flex;gap:6px;margin-bottom:10px}
.zone-box{flex:1;padding:10px 6px;border-radius:10px;font-family:‘JetBrains Mono’,monospace;font-size:10px;font-weight:700;text-align:center;border:2px solid var(–border);background:var(–card);color:var(–dim);letter-spacing:1px}
.zone-box.on-top{border-color:var(–top);color:var(–top);box-shadow:0 0 20px rgba(167,139,250,0.4)}
.zone-box.on-mid{border-color:var(–mid);color:var(–mid);box-shadow:0 0 20px rgba(59,130,246,0.4)}
.zone-box.on-bot{border-color:var(–bot);color:var(–bot);box-shadow:0 0 20px rgba(34,197,94,0.4)}
.zone-box .pct{font-size:13px;margin-top:3px;font-weight:800}
.zone-box .rule{font-size:9px;margin-top:3px;opacity:0.8}

.tabs{display:flex;gap:3px;margin-bottom:12px;background:var(–card);border-radius:10px;padding:3px;border:1px solid var(–border)}
.tab{flex:1;padding:9px;border:none;border-radius:8px;background:none;color:var(–dim);font-size:12px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif}
.tab.on{background:var(–accent);color:#fff}

.card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px}
.ct{font-family:‘JetBrains Mono’,monospace;font-size:10px;color:var(–dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700}

.ir{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ir label{font-size:12px;color:var(–dim);width:80px;font-weight:600}
.ir input,.ir select{flex:1;background:#0a0a0f;border:1px solid var(–border);border-radius:8px;padding:9px 12px;color:var(–text);font-family:‘JetBrains Mono’,monospace;font-size:14px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(–accent)}
.ir .u{font-size:12px;color:var(–dim);width:14px;font-weight:700}

.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;font-family:‘DM Sans’,sans-serif}
.btn:active{transform:scale(0.97)}
.btn-b{background:var(–accent);color:#fff}
.btn-s{background:var(–red);color:#fff}
.btn-d{background:var(–card2);color:var(–dim);border:1px solid var(–border)}
.btn-r{background:#1a0a0a;color:var(–red);border:1px solid var(–red)}
.btn-g{background:#0a1a0a;color:var(–green);border:1px solid var(–green);font-size:11px;padding:9px}
.btn-fetch{background:#1a1a2a;color:var(–accent);border:1px solid var(–accent);font-size:12px;padding:10px}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f97316);color:#000;font-weight:800;font-size:13px;padding:12px}

/* 떨사 스타일 표 */
.diary-table{width:100%;border-collapse:collapse;font-size:11px;font-family:‘JetBrains Mono’,monospace}
.diary-table th{background:var(–card2);color:var(–dim);font-size:9px;font-weight:700;padding:8px 4px;text-align:center;letter-spacing:0.5px;border-bottom:1px solid var(–border)}
.diary-table td{padding:8px 4px;text-align:center;border-bottom:1px solid var(–border);color:var(–text);font-weight:600}
.diary-table tr:hover{background:#0a0a14}
.diary-table tr.today{background:rgba(59,130,246,0.08)}
.diary-table tr.today td{color:var(–accent);font-weight:800}
.cell-up{color:var(–green)}
.cell-dn{color:var(–red)}
.cell-2u{color:var(–green);font-weight:700}
.cell-4u{color:var(–red);font-weight:700}
.cell-zone-top{color:var(–top)}
.cell-zone-mid{color:var(–mid)}
.cell-zone-bot{color:var(–bot)}

.order-table{width:100%;border-collapse:collapse;font-size:12px;font-family:‘JetBrains Mono’,monospace;margin-top:6px}
.order-table th{background:#0a0a1a;color:var(–accent);font-size:10px;padding:10px 6px;text-align:center;border-bottom:1px solid var(–accent)}
.order-table td{padding:10px 6px;text-align:center;border-bottom:1px solid var(–border);color:var(–text);font-weight:700}
.order-table tr.buy-row{background:rgba(34,197,94,0.04)}
.order-table tr.sell-row{background:rgba(167,139,250,0.04)}
.order-table .act-buy{color:var(–green);font-weight:800}
.order-table .act-sell{color:var(–top);font-weight:800}
.order-table .price-cell{font-size:14px;font-weight:800}

/* 보유 티어 표 */
.tier-table{width:100%;border-collapse:collapse;font-size:11px;font-family:‘JetBrains Mono’,monospace}
.tier-table th{background:var(–card2);color:var(–dim);font-size:9px;padding:8px 4px;text-align:center;letter-spacing:0.5px;border-bottom:1px solid var(–border)}
.tier-table td{padding:8px 4px;text-align:center;border-bottom:1px solid var(–border);font-weight:600}
.tier-table tr.empty{opacity:0.3}
.tier-table .pnl-up{color:var(–green);font-weight:700}
.tier-table .pnl-dn{color:var(–red);font-weight:700}

/* 시작일 설정 박스 */
.start-box{background:linear-gradient(135deg,#0a0a1f,#0f0a1a);border:2px solid var(–accent);border-radius:12px;padding:14px;margin-bottom:12px}
.start-box .title{font-size:11px;color:var(–accent);font-weight:700;margin-bottom:8px;letter-spacing:1px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(–card);border:1px solid var(–accent);border-radius:14px;padding:18px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:2px;color:var(–accent);margin-bottom:10px}
.modal .desc{color:var(–dim);font-size:12px;margin-bottom:14px;line-height:1.6}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row .btn{margin-top:0}

.warn{background:#1a0a0a;border:1px solid var(–red);border-radius:10px;padding:12px;color:var(–red);font-weight:700;text-align:center;font-size:12px}
.danger-zone{background:#1a0a0a;border:2px dashed var(–red);border-radius:10px;padding:12px;margin-top:10px}
.danger-zone .title{color:var(–red);font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:8px}

.sb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px}
.sb-row .k{color:var(–dim)}
.sb-row .v{font-family:‘JetBrains Mono’,monospace;font-weight:700}

.note{background:#0a0a14;border-radius:8px;padding:10px;font-size:11px;color:var(–dim);line-height:1.6;margin-top:8px}

/* 미니 차트 */
.mc-box{background:linear-gradient(135deg,#0a0a1a,#0f0f1f);border:1px solid var(–border);border-radius:12px;padding:10px;margin-bottom:10px}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.mc-info{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.mc-sym{font-family:‘Bebas Neue’,sans-serif;font-size:14px;letter-spacing:1px;color:var(–dim)}
.mc-px{font-family:‘JetBrains Mono’,monospace;font-size:18px;font-weight:800;color:#fff}
.mc-chg{font-family:‘JetBrains Mono’,monospace;font-size:12px;font-weight:700}
.mc-chg.up{color:var(–green)}
.mc-chg.dn{color:var(–red)}
.mc-controls{display:flex;gap:3px}
.mc-btn{background:var(–card2);border:1px solid var(–border);color:var(–dim);border-radius:6px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:‘DM Sans’,sans-serif}
.mc-btn.active{background:var(–accent);color:#fff;border-color:var(–accent)}
.mc-btn:active{transform:scale(0.95)}
.mc-refresh{background:transparent;border:1px solid var(–border);color:var(–dim);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;margin-left:2px}
#mc-canvas{width:100%;height:80px;display:block}
.mc-bottom{font-family:‘JetBrains Mono’,monospace;font-size:9px;color:var(–dim);text-align:right;margin-top:4px}
</style>

</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:6px">
    <a href="/bt.html" style="background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;padding:8px 14px;border-radius:8px;text-decoration:none;font-size:11px;font-weight:700;box-shadow:0 4px 12px rgba(249,115,22,0.3)">📊 백테 →</a>
  </div>
  <h1><span id="ticker-name">SOXL</span> <span>HUNTER</span> 매매일지</h1>
  <div class="tickers-bar" id="tickers-bar"></div>

  <!-- 미니 차트 -->

  <div class="mc-box" id="mc-box">
    <div class="mc-top">
      <div class="mc-info">
        <span class="mc-sym" id="mc-sym">SOXL</span>
        <span class="mc-px" id="mc-px">--</span>
        <span class="mc-chg" id="mc-chg">--</span>
      </div>
      <div class="mc-controls">
        <button class="mc-btn" data-tf="1m" onclick="setTimeframe('1m')">1분</button>
        <button class="mc-btn" data-tf="10m" onclick="setTimeframe('10m')">10분</button>
        <button class="mc-btn" data-tf="1h" onclick="setTimeframe('1h')">1시간</button>
        <button class="mc-btn active" data-tf="1d" onclick="setTimeframe('1d')">일봉</button>
        <button class="mc-refresh" onclick="loadChart(true)" title="새로고침">🔄</button>
      </div>
    </div>
    <canvas id="mc-canvas"></canvas>
    <div class="mc-bottom" id="mc-bottom">로딩...</div>
  </div>

  <div class="stats">매일 자동 기록 · 다음날 LOC 자동 계산</div>
</div>

<div class="zone-bar">
  <div class="zone-box" id="zbox-top">천장<div class="pct">+2.5% / 7일</div><div class="rule">-10% 이내</div></div>
  <div class="zone-box" id="zbox-mid">중간<div class="pct">+0.5% / 7일</div><div class="rule">-10~-15%</div></div>
  <div class="zone-box" id="zbox-bot">바닥<div class="pct">+3% / 10일</div><div class="rule">-15% 이상</div></div>
</div>

<div class="tabs">
  <button class="tab on" id="tab-d" onclick="sw('d')">📋 주문</button>
  <button class="tab" id="tab-t" onclick="sw('t')">📦 보유</button>
  <button class="tab" id="tab-s" onclick="sw('s')">⚙️ 설정</button>
  <button class="tab" id="tab-h" onclick="sw('h')">📜 기록</button>
</div>

<div id="body"></div>

<a href="/bt.html" style="display:block;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;text-decoration:none;text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:14px;margin-top:14px;box-shadow:0 4px 16px rgba(249,115,22,0.3)">📊 백테스트 페이지로!</a>

<div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#333;margin-top:16px">HUNTER v13 매매일지 · 멀티종목 지원</div>
<div id="modal-container"></div>

<script>
const TU = 20, UP = 2, DN = 4, TOP_TH = -10, BOT_TH = -15;
const ZONES = {
  top: {tp:0.025, fd:7, label:'천장'},
  mid: {tp:0.005, fd:7, label:'중간'},
  bot: {tp:0.030, fd:10, label:'바닥'}
};

let tab = 'd';

// ========== 데이터 마이그레이션 ==========
let portfolios = JSON.parse(localStorage.getItem('v13-portfolios') || 'null');
if (!portfolios) {
  // v12에서 마이그레이션
  const v12 = JSON.parse(localStorage.getItem('v12-portfolios') || 'null');
  if (v12) {
    portfolios = {};
    for (const sym in v12) {
      portfolios[sym] = {
        seed: v12[sym].seed || 100000,
        startDate: '',  // 일지 시작일
        priceClose: v12[sym].priceClose || 0,
        priceLive: v12[sym].priceLive || 0,
        high20: v12[sym].high20 || 0,
        priceDate: v12[sym].priceDate || '',
        diary: [],  // [{date, close, high20, vsPrev, units, zone}, ...]
        pos: v12[sym].pos || [],
        hist: v12[sym].hist || []
      };
    }
  } else {
    portfolios = { SOXL: { seed:100000, startDate:'', priceClose:0, priceLive:0, high20:0, priceDate:'', diary:[], pos:[], hist:[] } };
  }
  localStorage.setItem('v13-portfolios', JSON.stringify(portfolios));
}

let activeSymbol = localStorage.getItem('v13-active') || 'SOXL';
if (!portfolios[activeSymbol]) {
  activeSymbol = Object.keys(portfolios)[0] || 'SOXL';
  if (!portfolios[activeSymbol]) {
    portfolios.SOXL = { seed:100000, startDate:'', priceClose:0, priceLive:0, high20:0, priceDate:'', diary:[], pos:[], hist:[] };
    activeSymbol = 'SOXL';
  }
}

// 검증
for (const sym in portfolios) {
  const p = portfolios[sym];
  p.seed = Number(p.seed) || 100000;
  p.startDate = p.startDate || '';
  p.priceClose = Number(p.priceClose) || 0;
  p.priceLive = Number(p.priceLive) || 0;
  p.high20 = Number(p.high20) || 0;
  p.priceDate = p.priceDate || '';
  p.diary = Array.isArray(p.diary) ? p.diary : [];
  p.pos = Array.isArray(p.pos) ? p.pos : [];
  p.hist = Array.isArray(p.hist) ? p.hist : [];
}

const $ = id => document.getElementById(id);
const gv = id => parseFloat($(id).value) || 0;
const td = () => new Date().toISOString().slice(0,10);
const curPort = () => portfolios[activeSymbol];

const save = () => {
  localStorage.setItem('v13-portfolios', JSON.stringify(portfolios));
  localStorage.setItem('v13-active', activeSymbol);
};

const db = (a,b) => {
  try {
    if (!a||!b) return 0;
    const d1=new Date(a), d2=new Date(b);
    if (isNaN(d1.getTime())||isNaN(d2.getTime())) return 0;
    let days=0, cur=new Date(d1);
    while(cur<d2) { cur.setDate(cur.getDate()+1); if(cur.getDay()!==0&&cur.getDay()!==6) days++; }
    return days;
  } catch(e) { return 0; }
};

function getZoneFor(close, high20) {
  if (!close || !high20) return 'top';
  const dd = (close - high20) / high20 * 100;
  if (dd >= TOP_TH) return 'top';
  if (dd <= BOT_TH) return 'bot';
  return 'mid';
}

function getZone() {
  const p = curPort();
  return getZoneFor(p.priceClose, p.high20);
}

function zoneDesc() {
  const z = getZone();
  const p = curPort();
  const dd = p.high20 ? ((p.priceClose - p.high20)/p.high20*100).toFixed(1) : 0;
  return { zone: z, dd: dd, label: ZONES[z].label };
}

// ========== 종목 관리 ==========
function switchSymbol(sym) {
  save(); activeSymbol = sym;
  if (!portfolios[sym]) portfolios[sym] = { seed:100000, startDate:'', priceClose:0, priceLive:0, high20:0, priceDate:'', diary:[], pos:[], hist:[] };
  save(); render();
  loadChart(true);
}

function addSymbol() {
  const sym = prompt('종목 코드:');
  if (!sym) return;
  const u = sym.toUpperCase().trim();
  if (!u) return;
  if (portfolios[u]) { alert('이미 있음'); return; }
  portfolios[u] = { seed:100000, startDate:'', priceClose:0, priceLive:0, high20:0, priceDate:'', diary:[], pos:[], hist:[] };
  save(); switchSymbol(u);
}

function removeSymbol(sym) {
  if (Object.keys(portfolios).length <= 1) { alert('최소 1개 필요'); return; }
  if (!confirm(`${sym} 삭제?`)) return;
  delete portfolios[sym];
  save();
  if (sym === activeSymbol) activeSymbol = Object.keys(portfolios)[0];
  render();
}

function renderTickers() {
  const bar = $('tickers-bar');
  if (!bar) return;
  const symCount = Object.keys(portfolios).length;
  let html = '';
  for (const sym in portfolios) {
    const p = portfolios[sym];
    const tierCount = p.pos.length;
    const totalU = p.pos.reduce((s,t) => s+(t.u||0), 0);
    const isActive = sym === activeSymbol;
    const delBtn = symCount > 1 ? `<button class="tc-del" onclick="event.stopPropagation();removeSymbol('${sym}')">×</button>` : '';
    html += `<div class="ticker-card ${isActive?'active':''}" onclick="switchSymbol('${sym}')">
      ${delBtn}
      <div class="tc-sym">${sym}</div>
      <div class="tc-price">$${(p.priceLive||p.priceClose||0).toFixed(2)}</div>
      <div class="tc-info">${tierCount}티어·${totalU}u</div>
    </div>`;
  }
  html += `<div class="ticker-add" onclick="addSymbol()">+</div>`;
  bar.innerHTML = html;
  const tn = $('ticker-name');
  if (tn) tn.textContent = activeSymbol;
}

// ========== 일지 빌드 ==========
async function buildDiary() {
  const p = curPort();
  if (!p.startDate) { alert('시작일을 설정하세요'); return; }
  
  try {
    const start = new Date(p.startDate);
    start.setDate(start.getDate() - 35); // 20일 전고 계산용 여유
    const fmt = d => d.toISOString().slice(0,10);
    
    const res = await fetch(`/api/history?symbol=${activeSymbol}&start=${fmt(start)}&end=${td()}`);
    if (!res.ok) { alert(`API 오류 ${res.status}`); return; }
    
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { alert('API 응답 오류'); return; }
    
    if (data.error) { alert('실패: '+data.error); return; }
    if (!data.bars || data.bars.length < 21) { alert('데이터 부족'); return; }
    
    // 시작일 인덱스 찾기
    const startTs = new Date(p.startDate).getTime();
    let startIdx = -1;
    for (let i = 0; i < data.bars.length; i++) {
      if (new Date(data.bars[i].date).getTime() >= startTs) { startIdx = i; break; }
    }
    if (startIdx < 0) { alert('시작일 데이터 없음'); return; }
    
    // 일지 생성
    const diary = [];
    for (let i = startIdx; i < data.bars.length; i++) {
      const bar = data.bars[i];
      const prevBar = i > 0 ? data.bars[i-1] : null;
      
      // 20일 전고 (해당 날짜 포함 직전 20일)
      const start20 = Math.max(0, i - 19);
      const last20 = data.bars.slice(start20, i + 1);
      const high20 = Math.max(...last20.map(b => b.high));
      
      // vs 전날
      const vsPrev = prevBar ? ((bar.close - prevBar.close) / prevBar.close * 100) : 0;
      
      // 다음날 매수 유닛 (오늘 종가 기준)
      // 오늘 종가 ↑ 전날 → 내일 2u (상승 대응)
      // 오늘 종가 ↓ 전날 → 내일 4u (하락 추가)
      const nextUnits = (prevBar && bar.close < prevBar.close) ? DN : UP;
      
      // 오늘 종가 기준 zone
      const zone = getZoneFor(bar.close, high20);
      
      diary.push({
        date: bar.date,
        close: +bar.close.toFixed(2),
        high20: +high20.toFixed(2),
        vsPrev: +vsPrev.toFixed(2),
        units: nextUnits,
        zone: zone
      });
    }
    
    p.diary = diary;
    
    // 마지막 날 데이터로 현재 가격도 갱신
    if (diary.length > 0) {
      const last = diary[diary.length - 1];
      p.priceClose = last.close;
      p.high20 = last.high20;
      p.priceDate = last.date;
    }
    
    save();
    render();
    
    alert(`✅ ${activeSymbol} 매매일지 생성!\n\n📅 ${p.startDate} ~ ${diary[diary.length-1].date}\n📊 총 ${diary.length}일\n💰 마지막 종가: $${diary[diary.length-1].close}`);
  } catch(e) {
    alert('실패: ' + e.message);
  }
}

// 일지 한 줄 추가 (수동)
async function refreshLastDay() {
  const p = curPort();
  if (!p.startDate) { alert('시작일 먼저 설정하세요'); return; }
  await buildDiary();
}

// 시작일 설정
function setStartDate() {
  const dateEl = $('start-date-in');
  if (!dateEl) return;
  curPort().startDate = dateEl.value;
  save();
  render();
}

// ========== 탭 전환 ==========
function sw(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('on', ['d','t','s','h'][i]===t);
  });
  render();
}

function renderZones() {
  const z = getZone();
  ['top','mid','bot'].forEach(x => {
    const el = $('zbox-'+x);
    el.className = (x===z) ? 'zone-box on-'+x : 'zone-box';
  });
}

// ========== 미니 차트 ==========
let chartTimeframe = localStorage.getItem('v13-tf') || '1d';
let chartCache = {};

function setTimeframe(tf) {
  chartTimeframe = tf;
  localStorage.setItem('v13-tf', tf);
  document.querySelectorAll('.mc-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tf === tf);
  });
  loadChart(true);
}

async function loadChart(force) {
  const tf = chartTimeframe;
  const cacheKey = `${activeSymbol}_${tf}`;
  const cached = chartCache[cacheKey];
  const cacheMs = tf === '1m' ? 30000 : tf === '10m' ? 60000 : tf === '1h' ? 300000 : 600000;
  
  if (!force && cached && Date.now() - cached.fetchedAt < cacheMs) {
    drawChart(cached);
    return;
  }
  
  const symEl = $('mc-sym');
  if (symEl) symEl.textContent = activeSymbol;
  const bottomEl = $('mc-bottom');
  if (bottomEl) bottomEl.textContent = '로딩...';
  
  try {
    let bars = [];
    let livePrice = 0;
    let previousClose = 0;
    let marketState = 'UNKNOWN';
    
    // 분봉/시간봉이면 intraday API 시도, 실패하면 일봉으로 폴백
    if (tf === '1m' || tf === '10m' || tf === '1h') {
      try {
        const res = await fetch(`/api/intraday?symbol=${activeSymbol}&interval=${tf}`);
        if (res.ok) {
          const data = await res.json();
          if (!data.error && data.bars && data.bars.length > 0) {
            bars = data.bars.map(b => ({ close: b.close }));
            livePrice = data.livePrice;
            previousClose = data.previousClose;
            marketState = data.marketState;
          } else {
            throw new Error(data.error || 'no bars');
          }
        } else {
          throw new Error(`API ${res.status}`);
        }
      } catch (e) {
        // intraday 실패 → 일봉으로 폴백
        if (bottomEl) bottomEl.textContent = `${tf} 미지원, 일봉으로 표시...`;
        return loadDailyChart(force);
      }
    } else {
      // 일봉
      return loadDailyChart(force);
    }
    
    chartCache[cacheKey] = {
      symbol: activeSymbol,
      interval: tf,
      bars: bars,
      livePrice: livePrice,
      previousClose: previousClose,
      changePercent: previousClose > 0 ? ((livePrice - previousClose) / previousClose * 100) : 0,
      marketState: marketState,
      fetchedAt: Date.now()
    };
    
    drawChart(chartCache[cacheKey]);
  } catch (e) {
    if (bottomEl) bottomEl.textContent = `❌ ${e.message}`;
    const pxEl = $('mc-px');
    if (pxEl) pxEl.textContent = '--';
    const chgEl = $('mc-chg');
    if (chgEl) { chgEl.textContent = '--'; chgEl.className = 'mc-chg'; }
  }
}

// 일봉 (잘 작동하던 history.js + quote.js 사용)
async function loadDailyChart(force) {
  const cacheKey = `${activeSymbol}_1d`;
  const bottomEl = $('mc-bottom');
  
  try {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - 45);
    const fmt = d => d.toISOString().slice(0, 10);
    
    const [historyRes, quoteRes] = await Promise.all([
      fetch(`/api/history?symbol=${activeSymbol}&start=${fmt(start)}&end=${fmt(end)}`),
      fetch(`/api/quote?symbol=${activeSymbol}`)
    ]);
    
    if (!historyRes.ok) throw new Error(`History ${historyRes.status}`);
    
    const historyData = await historyRes.json();
    const quoteData = quoteRes.ok ? await quoteRes.json() : {};
    
    if (historyData.error) throw new Error(historyData.error);
    if (!historyData.bars || historyData.bars.length === 0) throw new Error('데이터 없음');
    
    const bars = historyData.bars.slice(-30).map(b => ({ close: b.close }));
    const livePrice = quoteData.price || bars[bars.length-1].close;
    const previousClose = bars.length >= 2 ? bars[bars.length-2].close : livePrice;
    
    chartCache[cacheKey] = {
      symbol: activeSymbol,
      interval: '1d',
      bars: bars,
      livePrice: livePrice,
      previousClose: previousClose,
      changePercent: previousClose > 0 ? ((livePrice - previousClose) / previousClose * 100) : 0,
      marketState: quoteData.marketState || 'UNKNOWN',
      fetchedAt: Date.now()
    };
    
    drawChart(chartCache[cacheKey]);
  } catch (e) {
    if (bottomEl) bottomEl.textContent = `❌ ${e.message}`;
    const pxEl = $('mc-px');
    if (pxEl) pxEl.textContent = '--';
    const chgEl = $('mc-chg');
    if (chgEl) { chgEl.textContent = '--'; chgEl.className = 'mc-chg'; }
  }
}

function drawChart(d) {
  // 헤더 정보
  const symEl = $('mc-sym');
  if (symEl) symEl.textContent = d.symbol;
  
  const pxEl = $('mc-px');
  if (pxEl) pxEl.textContent = `$${d.livePrice.toFixed(2)}`;
  
  const chgEl = $('mc-chg');
  if (chgEl) {
    const chg = d.changePercent || 0;
    chgEl.textContent = `${chg>=0?'+':''}${chg.toFixed(2)}%`;
    chgEl.className = `mc-chg ${chg>=0?'up':'dn'}`;
  }
  
  // 캔버스
  const canvas = $('mc-canvas');
  if (!canvas) return;
  
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);
  
  const padding = 4;
  const w = rect.width - padding * 2;
  const h = rect.height - padding * 2;
  
  const closes = d.bars.map(b => b.close);
  if (closes.length === 0) return;
  
  const minP = Math.min(...closes);
  const maxP = Math.max(...closes);
  const range = (maxP - minP) || 0.01;
  
  const isUp = (d.changePercent || 0) >= 0;
  const color = isUp ? '#22c55e' : '#ef4444';
  const colorRGB = isUp ? '34, 197, 94' : '239, 68, 68';
  
  // 그라디언트 영역
  const gradient = ctx.createLinearGradient(0, padding, 0, padding + h);
  gradient.addColorStop(0, `rgba(${colorRGB}, 0.3)`);
  gradient.addColorStop(1, `rgba(${colorRGB}, 0)`);
  
  ctx.beginPath();
  ctx.moveTo(padding, padding + h);
  closes.forEach((p, i) => {
    const x = padding + (i / (closes.length - 1)) * w;
    const y = padding + h - ((p - minP) / range) * h;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(padding + w, padding + h);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // 라인
  ctx.beginPath();
  closes.forEach((p, i) => {
    const x = padding + (i / (closes.length - 1)) * w;
    const y = padding + h - ((p - minP) / range) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // 마지막 점 (실시간)
  const lastX = padding + w;
  const lastY = padding + h - ((closes[closes.length-1] - minP) / range) * h;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  // 외곽 펄스
  ctx.beginPath();
  ctx.arc(lastX, lastY, 5, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.stroke();
  ctx.globalAlpha = 1;
  
  // Footer
  const bottomEl = $('mc-bottom');
  if (bottomEl) {
    const stateEmoji = {
      'PRE': '🌅 프리',
      'REGULAR': '🔴 LIVE',
      'POST': '🌃 애프터',
      'CLOSED': '✅ 마감',
      'UNKNOWN': '⏸️'
    }[d.marketState] || '';
    
    const tfLabel = {'1m':'1분봉', '10m':'5분봉', '1h':'1시간봉', '1d':'일봉'}[d.interval] || d.interval;
    const fetchedAt = new Date(d.fetchedAt);
    const timeStr = fetchedAt.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    
    bottomEl.textContent = `${stateEmoji} · ${tfLabel} · ↑$${maxP.toFixed(2)} ↓$${minP.toFixed(2)} · ${timeStr}`;
  }
}

render();

// 페이지 로드 시 차트 자동 로드 + 초기 토글 활성화
setTimeout(() => {
  document.querySelectorAll('.mc-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tf === chartTimeframe);
  });
  loadChart(false);
}, 100);

// 정규장/프리/애프터일 때 자동 갱신 (1분마다)
setInterval(() => {
  const cache = chartCache[`${activeSymbol}_${chartTimeframe}`];
  if (cache && ['PRE','REGULAR','POST'].includes(cache.marketState)) {
    loadChart(true);
  }
}, 60000);
</script>

</body>
</html>
