<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUNTER v11 Multi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:#111118;--card2:#1a1a1f;--border:#222233;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--dim:#666;--radius:16px;
  --top:#a78bfa;--mid:#3b82f6;--bot:#22c55e;--vol:#f5576c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:12px;max-width:500px;margin:0 auto}

.hdr{text-align:center;padding:20px 0 14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr .stats{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:6px;color:var(--green);letter-spacing:1px;font-weight:700}

.zone-bar{display:flex;gap:6px;margin-bottom:14px}
.zone-box{flex:1;padding:14px 8px;border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-align:center;border:2px solid var(--border);background:var(--card);color:var(--dim);letter-spacing:1px}
.zone-box.on{background:linear-gradient(135deg,#0a0a0f,var(--card));box-shadow:0 0 20px rgba(59,130,246,0.3)}
.zone-box.on-top{border-color:var(--top);color:var(--top)}
.zone-box.on-mid{border-color:var(--mid);color:var(--mid)}
.zone-box.on-bot{border-color:var(--bot);color:var(--bot)}
.zone-box .pct{font-size:14px;margin-top:4px;font-weight:800}
.zone-box .rule{font-size:9px;margin-top:4px;opacity:0.8}

.status-card{background:linear-gradient(135deg,#0a0a0f,var(--card));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.status-card .title{font-size:11px;color:var(--dim);letter-spacing:2px;font-weight:700;margin-bottom:10px}
.status-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.status-row .k{font-size:12px;color:var(--dim)}
.status-row .v{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800}
.zone-top{color:var(--top)}
.zone-mid{color:var(--mid)}
.zone-bot{color:var(--bot)}

.tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:9px;border:none;border-radius:10px;background:none;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.tab.on{background:var(--accent);color:#fff}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ct{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.ir{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ir label{font-size:13px;color:var(--dim);width:85px;font-weight:600}
.ir input{flex:1;background:#0a0a0f;border:2px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;text-align:right;outline:none;-webkit-appearance:none}
.ir input:focus{border-color:var(--accent)}
.ir input.auto{background:#0f0a1a;color:var(--accent)}
.ir .u{font-size:13px;color:var(--dim);width:16px;font-weight:700}

.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-b{background:var(--accent);color:#fff}
.btn-s{background:var(--red);color:#fff}
.btn-d{background:var(--card2);color:var(--dim);border:1px solid var(--border)}
.btn-r{background:#1a0a0a;color:var(--red);border:1px solid var(--red)}
.btn-seed{background:#0a1a0a;color:var(--green);border:1px solid var(--green);font-size:12px;padding:10px}
.btn-fetch{background:#1a1a2a;color:var(--accent);border:1px solid var(--accent);font-size:12px;padding:10px}
.btn-vol{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;font-size:12px;padding:10px}
.btn-bt{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;text-decoration:none;display:block;text-align:center}

.loc-box{background:var(--card2);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.loc-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px}
.order{border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.order.buy{background:#001a0f11;border-color:#22c55e33}
.order.sell-top{background:#1a0a1f11;border-color:#a78bfa33;border-left:3px solid var(--top)}
.order.sell-mid{background:#0a0a1f11;border-color:#3b82f633;border-left:3px solid var(--mid)}
.order.sell-bot{background:#001a0f11;border-color:#22c55e33;border-left:3px solid var(--bot)}
.order .lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px}
.order .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--text);margin-top:3px}
.order .desc{font-size:11px;color:var(--dim);margin-top:4px}

.tier-wrap{position:relative;overflow:hidden;margin-bottom:8px;border-radius:12px}
.tier-sell-bg{position:absolute;top:0;right:0;bottom:0;width:100%;background:linear-gradient(90deg,rgba(239,68,68,0.1),var(--red));display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:#fff;font-weight:800;font-family:'JetBrains Mono',monospace;font-size:14px}
.tier-sell-bg::before{content:"← 밀어서 매도"}
.tier-item{background:#0a0a0f;border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;touch-action:pan-y;transition:transform 0.2s;cursor:grab}
.tier-item.dragging{transition:none;cursor:grabbing}
.tier-item .top-row{display:flex;justify-content:space-between;align-items:center}
.tier-item .tid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:700}
.tier-item .info{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.tier-item .meta{font-size:11px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.tier-item .pnl{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.tier-item .pnl.up{color:var(--green)}
.tier-item .pnl.dn{color:var(--red)}
.tier-item.zone-top{border-left:3px solid var(--top)}
.tier-item.zone-mid{border-left:3px solid var(--mid)}
.tier-item.zone-bot{border-left:3px solid var(--bot)}
.tier-sell-btn{background:var(--red);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-left:8px}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:20px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
.modal .desc{color:var(--dim);font-size:13px;margin-bottom:16px;line-height:1.6}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row .btn{margin-top:0}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.sb{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sb .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.sb .l{font-size:10px;color:var(--dim);margin-top:2px;font-weight:600}

.warn{background:#1a0a0a;border:1px solid var(--red);border-radius:12px;padding:14px;color:var(--red);font-weight:700;text-align:center;font-size:13px}
.footer{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;margin-top:20px;letter-spacing:1px}

.danger-zone{background:#1a0a0a;border:2px dashed var(--red);border-radius:12px;padding:14px;margin-top:12px}
.danger-zone .title{color:var(--red);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:10px}

/* 미니 카드 탭 v10 */
.tickers-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 12px;
  background: #1a1a2e;
  border-bottom: 1px solid #333;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.tickers-bar::-webkit-scrollbar { display: none; }
.ticker-card {
  min-width: 80px;
  padding: 8px 12px;
  background: #2a2a3e;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
}
.ticker-card:hover { background: #3a3a4e; }
.ticker-card.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 4px 12px rgba(102,126,234,0.4);
}
.tc-sym {
  font-weight: 700;
  font-size: 14px;
  color: #fff;
}
.tc-price {
  font-size: 13px;
  color: #ffd;
  margin-top: 2px;
}
.tc-info {
  font-size: 10px;
  color: #aaa;
  margin-top: 2px;
}
.tc-vol {
  position: absolute;
  top: 2px;
  right: 4px;
  font-size: 8px;
  background: var(--vol);
  color: #fff;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 700;
  font-family: 'JetBrains Mono',monospace;
}
.ticker-add {
  min-width: 50px;
  padding: 8px;
  background: #2a2a3e;
  border: 2px dashed #555;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 24px;
  font-weight: 300;
  color: #888;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.ticker-add:hover { 
  background: #3a3a4e;
  border-color: #888;
  color: #fff;
}

/* 변동성 카드 */
.vol-card {
  background: linear-gradient(135deg, #1a2a4e, #2a1a4e);
  border: 1px solid rgba(245, 87, 108, 0.3);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.vol-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.vol-num {
  font-family: 'JetBrains Mono',monospace;
  font-size: 22px;
  font-weight: 800;
  color: #ffdd44;
}
.vol-cat {
  font-size: 11px;
  color: #fff;
  font-weight: 700;
}
.vol-mode-btns {
  display: flex;
  gap: 4px;
  margin-top: 10px;
}
.vol-mode-btn {
  flex: 1;
  padding: 6px 4px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #aaa;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'JetBrains Mono',monospace;
}
.vol-mode-btn.on {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.vol-params {
  font-family: 'JetBrains Mono',monospace;
  font-size: 11px;
  color: #ccc;
  margin-top: 8px;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  line-height: 1.6;
}

</style>
</head>
<body>
<div class="hdr">
  <h1><span id="ticker-name">SOXL</span> <span>HUNTER</span> v11</h1>
<div class="tickers-bar" id="tickers-bar"></div>
  <div class="stats">가져오기 시 변동성 자동 측정 · 종목별 자동 파라미터</div>
</div>

<div class="zone-bar" id="zone-bar">
  <div class="zone-box" id="zbox-top">
    천장
    <div class="pct" id="zp-top">+2.5% / 7일</div>
    <div class="rule">-10% 이내</div>
  </div>
  <div class="zone-box" id="zbox-mid">
    중간
    <div class="pct" id="zp-mid">+0.5% / 7일</div>
    <div class="rule">-10~-15%</div>
  </div>
  <div class="zone-box" id="zbox-bot">
    바닥
    <div class="pct" id="zp-bot">+3% / 10일</div>
    <div class="rule">-15% 이상</div>
  </div>
</div>

<div class="status-card" id="status">
  <div class="title">📊 현재 상태</div>
  <div id="status-body"></div>
</div>

<div class="tabs">
  <button class="tab" id="tab-m" onclick="sw('m')">매매</button>
  <button class="tab on" id="tab-t" onclick="sw('t')">티어</button>
  <button class="tab" id="tab-h" onclick="sw('h')">기록</button>
  <button class="tab" id="tab-g" onclick="sw('g')">가이드</button>
</div>

<div id="body"></div>

<a href="/bt.html" class="btn btn-bt">📊 백테스트 페이지로!</a>

<div class="footer">HUNTER v11 Multi · 변동성 자동 튜닝 · 종목별 파라미터</div>

<div id="modal-container"></div>

<script>
// ========== 전역 설정 ==========
const TU = 20;
const UP = 2;
const DN = 4;
const TOP_TH = -10;
const BOT_TH = -15;

// ========== 기본 파라미터 (SOXL용) ==========
const DEFAULT_PARAMS = {
  top_p: 0.025, mid_p: 0.005, bot_p: 0.03,
  top_d: 7, mid_d: 7, bot_d: 10,
  lookback: 20
};

// ========== 변동성 기반 자동 파라미터 계산 ==========
function calcAutoParams(vol) {
  // 매도 목표: 변동성 × 배수
  const top_p = vol * 0.5 / 100;
  const mid_p = vol * 0.3 / 100;
  const bot_p = vol * 0.8 / 100;
  
  // 강제청산 기간 (변동성 반비례)
  let top_d, mid_d, bot_d, lookback;
  if (vol >= 5) { top_d = 7; mid_d = 7; bot_d = 10; lookback = 20; }
  else if (vol >= 3) { top_d = 15; mid_d = 15; bot_d = 22; lookback = 40; }
  else if (vol >= 2) { top_d = 30; mid_d = 30; bot_d = 45; lookback = 60; }
  else if (vol >= 1.5) { top_d = 55; mid_d = 55; bot_d = 82; lookback = 100; }
  else { top_d = 90; mid_d = 90; bot_d = 120; lookback = 100; }
  
  return { top_p, mid_p, bot_p, top_d, mid_d, bot_d, lookback };
}

function categorizeVol(vol) {
  if (vol < 1.0) return { emoji: '🟢', name: '안정주', freq: '년 2~3회' };
  if (vol < 1.5) return { emoji: '🔵', name: '지수 ETF', freq: '년 3~5회' };
  if (vol < 2.5) return { emoji: '🟣', name: '안정 성장주', freq: '년 5~10회' };
  if (vol < 4.0) return { emoji: '🟠', name: '변동 개별주', freq: '년 15~25회' };
  if (vol < 6.0) return { emoji: '🔴', name: '고변동 ETF', freq: '년 30~50회' };
  return { emoji: '🚨', name: '극변동', freq: '매일!' };
}

// ========== 활성 파라미터 구하기 ==========
function getActiveParams(p) {
  // 포트폴리오 데이터에서 현재 모드에 맞는 파라미터 반환
  const mode = p.paramMode || 'basic'; // 'basic' | 'auto' | 'custom'
  if (mode === 'basic') return {...DEFAULT_PARAMS};
  if (mode === 'auto' && p.vol) return calcAutoParams(p.vol);
  if (mode === 'custom' && p.customParams) return p.customParams;
  return {...DEFAULT_PARAMS};
}

// ========== 상태 ==========
let tab = 't';

// 포트폴리오 마이그레이션
let portfolios = JSON.parse(localStorage.getItem('v11-portfolios') || 'null');
if (!portfolios) {
  // v10 데이터 있으면 마이그레이션
  const v10 = JSON.parse(localStorage.getItem('v10-portfolios') || 'null');
  if (v10) {
    portfolios = {};
    for (const sym in v10) {
      portfolios[sym] = {
        ...v10[sym],
        vol: null,
        volDate: null,
        paramMode: 'basic',
        customParams: null
      };
    }
  } else {
    // v8에서 마이그레이션
    const oldSeed = parseFloat(localStorage.getItem('v8-seed') || '30000');
    const oldPrice = parseFloat(localStorage.getItem('v8-price') || '0');
    const oldHigh = parseFloat(localStorage.getItem('v8-high20') || '0');
    const oldPos = JSON.parse(localStorage.getItem('v8-pos') || '[]');
    const oldHist = JSON.parse(localStorage.getItem('v8-hist') || '[]');
    
    portfolios = {
      SOXL: {
        seed: oldSeed, price: oldPrice, high20: oldHigh,
        pos: oldPos, hist: oldHist,
        vol: null, volDate: null, paramMode: 'basic', customParams: null
      }
    };
  }
  localStorage.setItem('v11-portfolios', JSON.stringify(portfolios));
}

let activeSymbol = localStorage.getItem('v11-active') || 'SOXL';
if (!portfolios[activeSymbol]) {
  activeSymbol = Object.keys(portfolios)[0] || 'SOXL';
  if (!portfolios[activeSymbol]) {
    portfolios['SOXL'] = { seed: 30000, price: 0, high20: 0, pos: [], hist: [], vol: null, volDate: null, paramMode: 'basic', customParams: null };
    activeSymbol = 'SOXL';
  }
}

// 현재 종목 참조 (매번 portfolios에서 가져옴)
function curPort() { return portfolios[activeSymbol]; }
function curParams() { return getActiveParams(curPort()); }

const $ = id => document.getElementById(id);
const gv = id => parseFloat($(id).value) || 0;

const save = () => {
  localStorage.setItem('v11-portfolios', JSON.stringify(portfolios));
  localStorage.setItem('v11-active', activeSymbol);
};

function switchSymbol(sym) {
  save();
  activeSymbol = sym;
  if (!portfolios[sym]) {
    portfolios[sym] = { seed: 10000, price: 0, high20: 0, pos: [], hist: [], vol: null, volDate: null, paramMode: 'basic', customParams: null };
  }
  save();
  renderTickers();
  render();
}

function addSymbol() {
  const sym = prompt('종목 코드 입력 (예: POET, TSLA, NVDA):');
  if (!sym) return;
  const upperSym = sym.toUpperCase().trim();
  if (!upperSym) return;
  if (portfolios[upperSym]) { alert('이미 있는 종목!'); return; }
  portfolios[upperSym] = { seed: 10000, price: 0, high20: 0, pos: [], hist: [], vol: null, volDate: null, paramMode: 'basic', customParams: null };
  save();
  switchSymbol(upperSym);
  setTimeout(() => fetchAuto(), 300);
}

function removeSymbol(sym) {
  if (Object.keys(portfolios).length <= 1) { alert('최소 1개 종목은 필요!'); return; }
  if (!confirm(`${sym} 삭제? 시드와 매매내역 모두 삭제됩니다!`)) return;
  delete portfolios[sym];
  save();
  if (sym === activeSymbol) {
    activeSymbol = Object.keys(portfolios)[0];
    switchSymbol(activeSymbol);
  } else {
    renderTickers();
  }
}

function renderTickers() {
  const bar = $('tickers-bar');
  if (!bar) return;
  
  let html = '';
  for (const sym in portfolios) {
    const p = portfolios[sym];
    const tierCount = p.pos.length;
    const totalU = p.pos.reduce((s, t) => s + t.u, 0);
    const isActive = sym === activeSymbol;
    const volBadge = p.vol ? `<div class="tc-vol">${p.vol.toFixed(1)}%</div>` : '';
    
    html += `<div class="ticker-card ${isActive ? 'active' : ''}" 
      onclick="switchSymbol('${sym}')"
      oncontextmenu="event.preventDefault(); removeSymbol('${sym}'); return false;"
      ontouchstart="startLongPress('${sym}')"
      ontouchend="cancelLongPress()">
      ${volBadge}
      <div class="tc-sym">${sym}</div>
      <div class="tc-price">$${(p.price||0).toFixed(2)}</div>
      <div class="tc-info">${tierCount}티어 · ${totalU}u</div>
    </div>`;
  }
  
  html += `<div class="ticker-add" onclick="addSymbol()">+</div>`;
  bar.innerHTML = html;
  
  const tn = $('ticker-name');
  if (tn) tn.textContent = activeSymbol;
}

let longPressTimer = null;
function startLongPress(sym) {
  longPressTimer = setTimeout(() => { removeSymbol(sym); }, 800);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

const td = () => new Date().toISOString().slice(0,10);
const db = (a,b) => { 
  const d1=new Date(a), d2=new Date(b); 
  let days=0, cur=new Date(d1);
  while(cur<d2) { cur.setDate(cur.getDate()+1); if(cur.getDay()!==0&&cur.getDay()!==6) days++; }
  return days;
};

function getZone() {
  const p = curPort();
  if (!p.price || !p.high20) return 'top';
  const dd = (p.price - p.high20) / p.high20 * 100;
  if (dd >= TOP_TH) return 'top';
  if (dd <= BOT_TH) return 'bot';
  return 'mid';
}

function zoneDesc() {
  const z = getZone();
  const p = curPort();
  const dd = p.high20 ? ((p.price - p.high20)/p.high20*100).toFixed(1) : 0;
  const labels = { top: '천장', mid: '중간', bot: '바닥' };
  return { zone: z, dd: dd, label: labels[z] };
}

function sw(t) {
  tab = t;

    b.classList.toggle('on', ['m','t','h','g'][i]===t);

  render();
}

let activeInputId = null;
let activeInputCursor = 0;
function saveActiveInput() {
  const ae = document.activeElement;
  if (ae && ae.tagName === 'INPUT') {
    activeInputId = ae.id;
    activeInputCursor = ae.selectionStart;
  } else activeInputId = null;
}
function restoreActiveInput() {
  if (activeInputId) {
    const el = $(activeInputId);
    if (el) {
      el.focus();
      try { if (el.type !== 'number') el.setSelectionRange(activeInputCursor, activeInputCursor); } catch(e) {}
    }
  }
}

// ========== 변동성 측정 ==========
async function measureVolatility() {
  const p = curPort();
  try {
    const end = new Date();
    const start = new Date();
    start.setFullYear(end.getFullYear() - 1);
    const fmt = d => d.toISOString().slice(0, 10);
    
    const url = `/api/history?symbol=${activeSymbol}&start=${fmt(start)}&end=${fmt(end)}`;
    
    showModal(`
      <h3>📊 변동성 측정 중...</h3>
      <div class="desc">야후 파이낸스에서 ${activeSymbol} 1년 데이터 가져오는 중입니다.</div>
    `);
    
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.error) {
      closeModal();
      alert('측정 실패: ' + data.error);
      return;
    }
    
    if (!data.bars || data.bars.length < 30) {
      closeModal();
      alert('데이터 부족 (최소 30일 필요)');
      return;
    }
    
    const closes = data.bars.map(b => b.close);
    const returns = [];
    for (let i = 1; i < closes.length; i++) {
      returns.push((closes[i] - closes[i-1]) / closes[i-1] * 100);
    }
    const mean = returns.reduce((a,b) => a+b, 0) / returns.length;
    const variance = returns.reduce((s,r) => s + Math.pow(r-mean, 2), 0) / returns.length;
    const vol = Math.sqrt(variance);
    
    const cat = categorizeVol(vol);
    const autoParams = calcAutoParams(vol);
    
    p.vol = vol;
    p.volDate = td();
    save();
    
    showModal(`
      <h3 style="color:var(--vol)">📊 ${activeSymbol} 변동성</h3>
      <div style="text-align:center;padding:10px 0">
        <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;color:#ffdd44">${vol.toFixed(2)}%</div>
        <div style="font-size:14px;margin-top:6px">${cat.emoji} ${cat.name}</div>

let manualUnitOverride = false;

function upFillAuto() {
  const p = curPort();
  const params = curParams();
  const fp = gv('fp');
  if (!fp) {
    $('fs').value = '';
    $('fi').innerHTML = '';
    if (!manualUnitOverride) $('fu').value = UP;
    return;
  }
  
  let fu;
  let autoDetected = '';
  
  if (manualUnitOverride) {
    fu = gv('fu') || UP;
    autoDetected = ' <span style="color:var(--red)">⚠️ 수동</span>';
  } else if (p.price && fp < p.price) {
    fu = DN;
    $('fu').value = DN;
    const dropPct = ((fp - p.price) / p.price * 100).toFixed(1);
    autoDetected = ` <span style="color:var(--red)">🔻 하락일! (${dropPct}%)</span>`;
  } else if (p.price && fp >= p.price) {
    fu = UP;
    $('fu').value = UP;
    const upPct = ((fp - p.price) / p.price * 100).toFixed(1);
    autoDetected = ` <span style="color:var(--green)">🔺 상승일 (+${upPct}%)</span>`;
  } else {
    fu = gv('fu') || UP;
    autoDetected = ' <span style="color:var(--dim)">(어제종가 입력 필요)</span>';
  }
  
  const uw = p.seed/TU;
  const shares = Math.floor(fu * uw / fp);
  $('fs').value = shares;
  
  const z = zoneDesc();
  const zconf = { top: {tp: params.top_p, fd: params.top_d, label:'천장'},
                   mid: {tp: params.mid_p, fd: params.mid_d, label:'중간'},
                   bot: {tp: params.bot_p, fd: params.bot_d, label:'바닥'} };
  const pz = zconf[z.zone];
  const sell = (fp * (1+pz.tp)).toFixed(2);
  
  const prevInfo = p.price ? `어제 $${p.price} → 오늘 $${fp}${autoDetected}<br>` : '';
  
  $('fi').innerHTML = `${prevInfo}
    유닛당 $${uw.toFixed(0)} · <b>${fu}u</b> = $${(fu*uw).toFixed(0)} · <b style="color:var(--green)">${shares}주</b><br>
    구간: <b style="color:var(--${z.zone})">${pz.label}</b> · 매도 <b>$${sell}</b> (+${(pz.tp*100).toFixed(2)}%) · 강제 ${pz.fd}일`;
}

function setUnit(u) { manualUnitOverride = true; $('fu').value = u; upFillAuto(); }
function resetUnitAuto() { manualUnitOverride = false; upFillAuto(); }

function doBuy() {
  const p = curPort();
  const fp = gv('fp'), fu = gv('fu'), fs = gv('fs');
  if (!fp || !fu || !fs) return alert('체결가를 입력하세요 (주수는 자동 계산)');
  const z = getZone();
  p.pos.push({e: fp, u: fu, s: fs, d: td(), z: z});
  p.hist.push({a:'B', d: td(), e: fp, u: fu, s: fs, z: z});
  save();
  const zLabels = { top:'천장', mid:'중간', bot:'바닥' };
  alert(`T${p.pos.length} 기록 완료!\n${fs}주 @ $${fp} (${zLabels[z]})`);
  sw('t');
}

function promptSell(idx) {
  const p = curPort();
  const params = curParams();
  const pp = p.pos[idx];
  const zconf = { top: {tp: params.top_p, label:'천장'},
                   mid: {tp: params.mid_p, label:'중간'},
                   bot: {tp: params.bot_p, label:'바닥'} };
  const pz = zconf[pp.z];
  const defaultPrice = (pp.e * (1+pz.tp)).toFixed(2);
  
  showModal(`
    <h3>T${idx+1} 매도</h3>
    <div class="desc">매수가 <b>$${pp.e}</b> · ${pp.s}주 · ${pz.label}<br>
      추천 매도가: <b style="color:var(--green)">$${defaultPrice}</b> (+${(pz.tp*100).toFixed(2)}%)</div>
    <div class="ir"><label>매도가</label><input type="number" step="0.01" id="sell-price" value="${defaultPrice}"><span class="u">$</span></div>
    <div class="btn-row">
      <button class="btn btn-d" onclick="closeModal()">취소</button>
      <button class="btn btn-s" onclick="doSell(${idx})">매도!</button>
    </div>
  `);
}

function doSell(idx) {
  const p = curPort();
  const sellPrice = parseFloat($('sell-price').value);
  if (!sellPrice || sellPrice <= 0) return alert('매도가를 입력하세요');
  
  const pp = p.pos[idx];
  const pnl = (sellPrice - pp.e) / pp.e * 100;
  const realized = (sellPrice - pp.e) * pp.s;
  
  p.hist.push({
    a: 'S', d: td(), e: sellPrice, u: pp.u, s: pp.s, z: pp.z,
    pnl: pnl, buyPrice: pp.e, realized: realized
  });
  
  p.pos.splice(idx, 1);
  save();
  closeModal();
  
  if (p.pos.length === 0) {
    checkFullLiquidation();
  } else {
    alert(`T${idx+1} 매도 완료!\n${pp.s}주 @ $${sellPrice}\n수익: ${pnl>=0?'+':''}${pnl.toFixed(1)}% ($${realized.toFixed(0)})`);
    render();
  }
}

function checkFullLiquidation() {
  const p = curPort();
  let totalRealized = 0;
  let sellCount = 0;
  
  for (let i = p.hist.length - 1; i >= 0; i--) {
    const r = p.hist[i];
    if (r.a === 'S' && r.realized !== undefined) {
      totalRealized += r.realized;
      sellCount++;
    }
  }
  
  const newSeed = p.seed + totalRealized;
  const pct = (totalRealized / p.seed * 100).toFixed(1);
  
  showModal(`
    <h3>🎉 완전 청산!</h3>
    <div class="desc">
      모든 포지션이 청산되었습니다!<br><br>
      💰 총 실현 수익: <b style="color:${totalRealized>=0?'var(--green)':'var(--red)'}">$${totalRealized.toFixed(0)} (${pct>=0?'+':''}${pct}%)</b><br>
      📊 매도 횟수: ${sellCount}회<br><br>
      <div style="background:#0a1a0a;padding:12px;border-radius:8px;border:1px solid var(--green);margin-top:8px">
        <div style="font-size:11px;color:var(--dim)">현재 시드</div>
        <div style="font-size:18px;font-weight:800">$${p.seed.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:8px">새 시드 (복리 반영)</div>
        <div style="font-size:20px;font-weight:800;color:var(--green)">$${newSeed.toFixed(0)}</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-d" onclick="closeModal();render()">나중에</button>
      <button class="btn btn-b" onclick="applyNewSeed(${newSeed})">✅ 복리 적용!</button>
    </div>
  `);
}

// ========== 슬라이드 매도 ==========
let swipeState = {startX: 0, currentX: 0, idx: null, el: null};

function touchStart(e, idx) {
  swipeState.startX = e.touches[0].clientX;
  swipeState.idx = idx;
  swipeState.el = e.currentTarget;
  swipeState.el.classList.add('dragging');
}

function touchMove(e, idx) {
  if (swipeState.idx !== idx) return;
  swipeState.currentX = e.touches[0].clientX;
  const dx = swipeState.currentX - swipeState.startX;
  if (dx < 0) {
    const clamped = Math.max(dx, -200);
    swipeState.el.style.transform = `translateX(${clamped}px)`;
  }
}

function touchEnd(e, idx) {
  if (swipeState.idx !== idx) return;
  const dx = swipeState.currentX - swipeState.startX;
  swipeState.el.classList.remove('dragging');
  swipeState.el.style.transform = '';
  if (dx < -100) promptSell(idx);
  swipeState = {startX: 0, currentX: 0, idx: null, el: null};
}

function mouseStart(e, idx) {
  if (e.target.tagName === 'BUTTON') return;
  swipeState.startX = e.clientX;
  swipeState.idx = idx;
  swipeState.el = e.currentTarget;
  swipeState.el.classList.add('dragging');
  
  const onMove = (ev) => {
    swipeState.currentX = ev.clientX;
    const dx = ev.clientX - swipeState.startX;
    if (dx < 0) {
      const clamped = Math.max(dx, -200);
      swipeState.el.style.transform = `translateX(${clamped}px)`;
    }
  };
  
  const onUp = () => {
    const dx = swipeState.currentX - swipeState.startX;
    if (swipeState.el) {
      swipeState.el.classList.remove('dragging');
      swipeState.el.style.transform = '';
    }
    if (dx < -100) promptSell(idx);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    swipeState = {startX: 0, currentX: 0, idx: null, el: null};
  };
  
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

async function fetchAuto() {
  try {
    const res = await fetch('/api/quote?symbol=' + activeSymbol);
    const data = await res.json();
    if (data.error) { alert('자동 가져오기 실패: ' + data.error); return; }
    const p = curPort();
    if (data.price) p.price = data.price;
    if (data.high20) p.high20 = data.high20;
    save();
    render();
    const zLabels = { top:'천장', mid:'중간', bot:'바닥' };
    alert(`✅ ${activeSymbol} 자동 업데이트!\n날짜: ${data.lastDate}\n현재가: $${p.price}\n20일 전고: $${p.high20}\n구간: ${zLabels[getZone()]}\n시장 상태: ${data.marketState}`);
  } catch(e) {
    alert('자동 가져오기 실패.\n수동으로 입력해주세요.');
  }
}
