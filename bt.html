<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNTER Backtest</title>
<style>
:root {
  --bg: #0f0f1e;
  --card: #1a1a2e;
  --card-hover: #2a2a3e;
  --accent: #667eea;
  --accent2: #764ba2;
  --green: #0f0;
  --red: #f44;
  --orange: #ff8800;
  --yellow: #ff8;
  --dim: #888;
  --text: #fff;
  --top: #a855f7;
  --mid: #3b82f6;
  --bot: #10b981;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 16px;
  padding-bottom: 80px;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.back-btn {
  background: var(--card);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  border: 1px solid #333;
  transition: all 0.2s;
}
.back-btn:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}

.card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}

.ct {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--accent);
}

.ir {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  background: var(--card-hover);
  padding: 10px 14px;
  border-radius: 10px;
}

.ir label {
  font-size: 13px;
  color: var(--dim);
  min-width: 50px;
}

.ir input, .ir select {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.ir .u {
  color: var(--dim);
  font-size: 13px;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }

.progress {
  text-align: center;
  margin-top: 14px;
  color: var(--accent);
  font-size: 14px;
  min-height: 20px;
}

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.result-box {
  padding: 14px;
  border-radius: 12px;
  text-align: center;
}

.result-box.hold {
  background: var(--card-hover);
}

.result-box.hunter {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.rb-label {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 4px;
}

.rb-value {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 2px;
}

.rb-pct {
  font-size: 13px;
  opacity: 0.85;
}

.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--card-hover);
  font-size: 13px;
}

.metric-row:last-child { border-bottom: none; }

.metric-label { color: var(--dim); }
.metric-value { font-weight: 700; }

.year-row {
  display: grid;
  grid-template-columns: 60px 1fr 1fr;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--card-hover);
  font-size: 12px;
  align-items: center;
}

.year-label {
  font-weight: 700;
  color: var(--dim);
}

.period-info {
  background: var(--card-hover);
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  color: var(--dim);
  line-height: 1.7;
}

.quick-sym {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.quick-sym button {
  background: var(--card-hover);
  color: var(--text);
  border: 1px solid #333;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-sym button:hover {
  background: var(--accent);
  border-color: var(--accent);
}

.tip {
  background: var(--card-hover);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.6;
  margin-bottom: 14px;
}

</style>
</head>
<body>

<div class="header">
  <h1>📊 <span>HUNTER</span> 백테</h1>
  <a href="/" class="back-btn">← 돌아가기</a>
</div>

<div class="tip">
  💡 야후 파이낸스에서 자동 다운로드 → HUNTER 시뮬레이션!<br>
  원하는 종목과 기간 선택 후 [백테 실행]!
</div>

<div class="card">
  <div class="ct">🎯 백테 설정</div>
  <div class="ir">
    <label>종목</label>
    <input type="text" id="bt-sym" value="SOXL" placeholder="SOXL, POET, TSLA..." style="text-transform:uppercase">
    <span class="u">📊</span>
  </div>
  <div class="ir">
    <label>시작</label>
    <input type="date" id="bt-start" style="flex:1">
  </div>
  <div class="ir">
    <label>종료</label>
    <input type="date" id="bt-end" style="flex:1">
  </div>
  
  <div class="quick-sym" style="margin-top:8px">
    <button onclick="setRange(1)">1년</button>
    <button onclick="setRange(2)">2년</button>
    <button onclick="setRange(3)">3년</button>
    <button onclick="setRange(5)">5년</button>
    <button onclick="setRange(10)">10년</button>
    <button onclick="setRange(20)">최대</button>
  </div>
  
  <div class="quick-sym">
    <button onclick="setSym('SOXL')">SOXL</button>
    <button onclick="setSym('TQQQ')">TQQQ</button>
    <button onclick="setSym('POET')">POET</button>
    <button onclick="setSym('TSLA')">TSLA</button>
    <button onclick="setSym('NVDA')">NVDA</button>
    <button onclick="setSym('AMD')">AMD</button>
    <button onclick="setSym('AAPL')">AAPL</button>
  </div>
  
  <button class="btn btn-primary" onclick="runBacktest()">🚀 백테 실행!</button>
  <div class="progress" id="bt-progress"></div>
</div>

<div id="result"></div>

<script>
function setSym(s) {
  document.getElementById('bt-sym').value = s;
}

// 기간 빠른 선택
function setRange(years) {
  const end = new Date();
  const start = new Date();
  
  if (years === 20) {
    // 최대 (2015년부터)
    start.setFullYear(2015, 0, 1);
  } else {
    start.setFullYear(end.getFullYear() - years);
  }
  
  const fmt = d => d.toISOString().slice(0, 10);
  document.getElementById('bt-start').value = fmt(start);
  document.getElementById('bt-end').value = fmt(end);
}

// 초기값 설정 (5년)
window.addEventListener('DOMContentLoaded', () => {
  setRange(5);
});

async function runBacktest() {
  const sym = document.getElementById('bt-sym').value.toUpperCase().trim();
  const startDate = document.getElementById('bt-start').value;
  const endDate = document.getElementById('bt-end').value;
  
  if (!startDate || !endDate) {
    alert('시작일, 종료일 선택!');
    return;
  }
  
  if (!sym) {
    alert('종목 코드 입력!');
    return;
  }
  
  const progressEl = document.getElementById('bt-progress');
  const resultEl = document.getElementById('result');
  progressEl.innerHTML = '📥 데이터 가져오는 중...';
  resultEl.innerHTML = '';
  
  try {
    const res = await fetch(`/api/history?symbol=${sym}&start=${startDate}&end=${endDate}`);
    const data = await res.json();
    
    if (data.error) {
      progressEl.innerHTML = '❌ ' + data.error;
      return;
    }
    
    if (!data.bars || data.bars.length < 30) {
      progressEl.innerHTML = '❌ 데이터 부족: ' + (data.bars?.length || 0) + '일';
      return;
    }
    
    progressEl.innerHTML = `✅ ${data.bars.length}일 · 시뮬레이션 중...`;
    
    const result = simulateHunter(data.bars);
    const yearly = calculateYearly(data.bars);
    
    const buyHoldMult = data.lastPrice / data.firstPrice;
    const vsHold = result.mult / buyHoldMult;
    
    let html = `<div class="card">
      <div class="ct">📈 ${data.symbol} · ${startDate} ~ ${endDate}</div>
      
      <div class="result-grid">
        <div class="result-box hold">
          <div class="rb-label">📌 단순 보유</div>
          <div class="rb-value" style="color:${buyHoldMult>=1?'#0f0':'#f44'}">
            ${buyHoldMult.toFixed(2)}배
          </div>
          <div class="rb-pct">${((buyHoldMult-1)*100).toFixed(1)}%</div>
        </div>
        <div class="result-box hunter">
          <div class="rb-label">🏹 HUNTER</div>
          <div class="rb-value">${result.mult.toFixed(2)}배</div>
          <div class="rb-pct">${((result.mult-1)*100).toFixed(1)}%</div>
        </div>
      </div>
      
      <div class="metric-row">
        <span class="metric-label">HUNTER vs 단순보유</span>
        <span class="metric-value" style="color:${vsHold>1?'#0f0':'#f44'}">
          ${vsHold.toFixed(2)}배 ${vsHold>1?'🚀':'📉'}
        </span>
      </div>
      <div class="metric-row">
        <span class="metric-label">최대 낙폭 (MDD)</span>
        <span class="metric-value" style="color:#f88">${result.mdd.toFixed(1)}%</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">매수 / 매도</span>
        <span class="metric-value">${result.nBuys}회 / ${result.nSells}회</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">승률</span>
        <span class="metric-value" style="color:${result.winRate>70?'#0f0':'#ff8'}">
          ${result.winRate.toFixed(0)}%
        </span>
      </div>
    </div>
    
    <div class="card">
      <div class="ct">📅 기간 정보</div>
      <div class="period-info">
        ${data.firstDate} ~ ${data.lastDate}<br>
        시작 $${data.firstPrice?.toFixed(2)} → 종료 $${data.lastPrice?.toFixed(2)}<br>
        총 ${data.count}일
      </div>
    </div>`;
    
    if (yearly.length > 0) {
      html += `<div class="card">
        <div class="ct">📊 연도별 수익률</div>`;
      for (const y of yearly) {
        const color = y.gain > 0 ? '#0f0' : '#f44';
        html += `<div class="year-row">
          <div class="year-label">${y.year}</div>
          <div style="color:${color};font-weight:700">${y.gain>0?'+':''}${y.gain.toFixed(1)}%</div>
          <div style="color:#f88;font-size:11px;text-align:right">MDD ${y.mdd.toFixed(1)}%</div>
        </div>`;
      }
      html += '</div>';
    }
    
    resultEl.innerHTML = html;
    progressEl.innerHTML = '✅ 완료!';
    
  } catch(e) {
    progressEl.innerHTML = '❌ ' + e.message;
  }
}

function simulateHunter(bars) {
  const closes = bars.map(b => b.close);
  const n = closes.length;
  const warmup = 25;
  const TU = 20;
  const UP = 2, DN = 4;
  
  let cap = 100;
  let pe = [], pu = [], pd = [], zones = [];
  let pk = 100, mdd = 0;
  let nBuys = 0, nSells = 0, wins = 0;
  
  for (let i = warmup + 1; i < n; i++) {
    const cl = closes[i];
    const prev = closes[i-1];
    const units = cl < prev ? DN : UP;
    
    const start20 = Math.max(warmup, i - 20);
    const slice = closes.slice(start20, i+1);
    const recentHigh = Math.max(...slice);
    const dd = (cl - recentHigh) / recentHigh * 100;
    
    let zone;
    if (dd >= -10) zone = 'top';
    else if (dd <= -15) zone = 'bot';
    else zone = 'mid';
    
    const re = [], rd = [], ru = [], rz = [];
    for (let j = 0; j < pe.length; j++) {
      pd[j] += 1;
      const p = (cl - pe[j]) / pe[j];
      let tp, fd;
      if (zones[j] === 'top') { tp = 0.025; fd = 7; }
      else if (zones[j] === 'bot') { tp = 0.03; fd = 10; }
      else { tp = 0.005; fd = 7; }
      
      if (p >= tp || pd[j] >= fd) {
        cap *= (1 + p * pu[j] / TU);
        nSells++;
        if (p > 0) wins++;
      } else {
        re.push(pe[j]); rd.push(pd[j]); ru.push(pu[j]); rz.push(zones[j]);
      }
    }
    pe = re; pd = rd; pu = ru; zones = rz;
    
    const ti = pu.reduce((s, u) => s + u, 0);
    if (ti < TU && units > 0) {
      const a = Math.min(units, TU - ti);
      pe.push(cl); pd.push(0); pu.push(a); zones.push(zone);
      nBuys++;
    }
    
    let tv = cap;
    for (let j = 0; j < pe.length; j++) {
      tv *= (1 + (cl - pe[j]) / pe[j] * pu[j] / TU);
    }
    if (tv > pk) pk = tv;
    const ddv = (tv - pk) / pk * 100;
    if (ddv < mdd) mdd = ddv;
  }
  
  let final = cap;
  const lastClose = closes[n-1];
  for (let j = 0; j < pe.length; j++) {
    final *= (1 + (lastClose - pe[j]) / pe[j] * pu[j] / TU);
  }
  
  return {
    mult: final / 100,
    mdd: mdd,
    nBuys: nBuys,
    nSells: nSells,
    winRate: nSells > 0 ? wins / nSells * 100 : 0
  };
}

function calculateYearly(bars) {
  const yearData = {};
  for (const b of bars) {
    const yr = b.date.slice(0, 4);
    if (!yearData[yr]) yearData[yr] = [];
    yearData[yr].push(b);
  }
  
  const result = [];
  for (const yr of Object.keys(yearData).sort()) {
    const barsYr = yearData[yr];
    if (barsYr.length < 5) continue;
    const closes = barsYr.map(b => b.close);
    const sim = simulateHunterSimple(closes);
    result.push({ year: yr, gain: (sim.mult - 1) * 100, mdd: sim.mdd });
  }
  return result;
}

function simulateHunterSimple(closes) {
  const n = closes.length;
  if (n < 5) return { mult: 1, mdd: 0 };
  
  const TU = 20;
  const UP = 2, DN = 4;
  let cap = 100;
  let pe = [], pu = [], pd = [], zones = [];
  let pk = 100, mdd = 0;
  
  for (let i = 1; i < n; i++) {
    const cl = closes[i];
    const prev = closes[i-1];
    const units = cl < prev ? DN : UP;
    
    const start20 = Math.max(0, i - 20);
    const slice = closes.slice(start20, i+1);
    const recentHigh = Math.max(...slice);
    const dd = (cl - recentHigh) / recentHigh * 100;
    
    let zone;
    if (dd >= -10) zone = 'top';
    else if (dd <= -15) zone = 'bot';
    else zone = 'mid';
    
    const re = [], rd = [], ru = [], rz = [];
    for (let j = 0; j < pe.length; j++) {
      pd[j] += 1;
      const p = (cl - pe[j]) / pe[j];
      let tp, fd;
      if (zones[j] === 'top') { tp = 0.025; fd = 7; }
      else if (zones[j] === 'bot') { tp = 0.03; fd = 10; }
      else { tp = 0.005; fd = 7; }
      
      if (p >= tp || pd[j] >= fd) {
        cap *= (1 + p * pu[j] / TU);
      } else {
        re.push(pe[j]); rd.push(pd[j]); ru.push(pu[j]); rz.push(zones[j]);
      }
    }
    pe = re; pd = rd; pu = ru; zones = rz;
    
    const ti = pu.reduce((s, u) => s + u, 0);
    if (ti < TU && units > 0) {
      const a = Math.min(units, TU - ti);
      pe.push(cl); pd.push(0); pu.push(a); zones.push(zone);
    }
    
    let tv = cap;
    for (let j = 0; j < pe.length; j++) {
      tv *= (1 + (cl - pe[j]) / pe[j] * pu[j] / TU);
    }
    if (tv > pk) pk = tv;
    const ddv = (tv - pk) / pk * 100;
    if (ddv < mdd) mdd = ddv;
  }
  
  let final = cap;
  const lastClose = closes[n-1];
  for (let j = 0; j < pe.length; j++) {
    final *= (1 + (lastClose - pe[j]) / pe[j] * pu[j] / TU);
  }
  
  return { mult: final / 100, mdd: mdd };
}
</script>

</body>
</html>
