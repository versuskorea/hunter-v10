<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNTER 백테 v3 - 진짜 사이클</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: #0f0f1e !important; color: #fff !important; color-scheme: dark !important; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; padding-bottom: 80px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #fff !important; }
h1 .grad { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.back-btn { background: #1a1a2e !important; color: #fff !important; padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 13px; border: 1px solid #333; }
.card { background: #1a1a2e !important; border-radius: 14px; padding: 16px; margin-bottom: 14px; color: #fff !important; }
.ct { font-weight: 700; font-size: 15px; margin-bottom: 12px; color: #667eea !important; }
.ir { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #2a2a3e !important; padding: 10px 14px; border-radius: 10px; }
.ir label { font-size: 13px; color: #aaa !important; min-width: 50px; }
.ir input, .ir select { flex: 1; background: transparent !important; border: none; color: #fff !important; font-size: 15px; outline: none; }
.ir input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }
.ir .u { color: #888 !important; font-size: 13px; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; color: #fff !important; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2) !important; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
.btn-analyze { background: linear-gradient(135deg, #f093fb, #f5576c) !important; }
.progress { text-align: center; margin-top: 14px; color: #667eea !important; font-size: 14px; min-height: 20px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.result-box { padding: 14px; border-radius: 12px; text-align: center; }
.result-box.hold { background: #2a2a3e !important; }
.result-box.hunter { background: linear-gradient(135deg, #667eea, #764ba2) !important; }
.rb-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
.rb-value { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.rb-pct { font-size: 13px; opacity: 0.85; }
.metric-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a3e; font-size: 13px; }
.metric-row:last-child { border-bottom: none; }
.metric-label { color: #aaa !important; }
.metric-value { font-weight: 700; }
.quick-sym { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.quick-sym button { background: #2a2a3e !important; color: #fff !important; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
.tip { background: #1a1a2e !important; padding: 12px 14px; border-radius: 10px; font-size: 13px; color: #bbb !important; line-height: 1.6; margin-bottom: 14px; border: 1px solid #2a2a3e; }
.cycle-badge { display: inline-block; background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff !important; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 6px; vertical-align: middle; }
.vol-result { background: linear-gradient(135deg, #1a2a4e, #2a1a4e) !important; padding: 16px; border-radius: 14px; margin-bottom: 14px; }
.vol-main { text-align: center; padding: 12px 0; }
.vol-num { font-size: 40px; font-weight: 800; color: #ffdd44 !important; }
.vol-cat { font-size: 15px; margin-top: 6px; }
.param-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.param-label { color: #bbb !important; }
.param-value { color: #ffdd88 !important; font-weight: 700; }
.warmup-info { background: rgba(0, 200, 83, 0.1); border: 1px solid rgba(0, 200, 83, 0.3); padding: 10px 12px; border-radius: 8px; margin-top: 10px; font-size: 12px; color: #8fe8b0 !important; line-height: 1.6; }
.cycle-card { background: linear-gradient(135deg, #1a3a2e, #1a2a4e) !important; border: 1px solid rgba(245, 158, 11, 0.4); padding: 16px; border-radius: 14px; margin-top: 12px; }
.cs-title { font-size: 14px; font-weight: 700; color: #fbbf24 !important; margin-bottom: 12px; }
.cycle-main { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.cycle-big { background: rgba(0,0,0,0.4); padding: 14px; border-radius: 10px; text-align: center; }
.cycle-big .lbl { font-size: 11px; color: #aaa !important; margin-bottom: 6px; }
.cycle-big .big { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.cycle-big .sub { font-size: 12px; color: #aaa !important; margin-top: 4px; }
.cycle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.cycle-mini { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; text-align: center; }
.cycle-mini .lbl { font-size: 10px; color: #999 !important; margin-bottom: 2px; }
.cycle-mini .val { font-size: 14px; font-weight: 700; }
.cycle-distribution { margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; }
.cycle-dist-row { display: flex; align-items: center; font-size: 11px; margin: 4px 0; color: #ddd !important; font-family: monospace; }
.cycle-dist-row .dist-label { width: 95px; flex-shrink: 0; color: #aaa !important; font-size: 10px; }
.cycle-dist-row .dist-bar { flex: 1; height: 14px; background: #2a2a3e; border-radius: 4px; margin: 0 8px; position: relative; overflow: hidden; display: block; min-width: 50px; }
.cycle-dist-row .dist-fill { display: block; height: 100%; border-radius: 4px; min-width: 2px; transition: width 0.5s; }
.cycle-dist-row .dist-cnt { width: 80px; flex-shrink: 0; text-align: right; font-size: 10px; }
.def-info { background: rgba(0,0,0,0.25); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 11px; color: #ccc !important; line-height: 1.7; }
.def-info b { color: #fbbf24 !important; }
.best-worst { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.bw-card { padding: 10px; border-radius: 8px; font-size: 11px; line-height: 1.5; }
.bw-card.best { background: rgba(0, 255, 0, 0.08); border: 1px solid rgba(0, 255, 0, 0.3); }
.bw-card.worst { background: rgba(255, 0, 0, 0.08); border: 1px solid rgba(255, 0, 0, 0.3); }
.bw-card .bw-pnl { font-size: 18px; font-weight: 800; margin: 4px 0; }
.bw-card.best .bw-pnl { color: #0f0 !important; }
.bw-card.worst .bw-pnl { color: #f88 !important; }
.bw-card .bw-date { color: #aaa !important; font-size: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 <span class="grad">HUNTER</span> 백테<span class="cycle-badge">사이클 v3</span></h1>
  <a href="/" class="back-btn">← 돌아가기</a>
</div>

<div class="tip">
  💡 <b>v3:</b> 진짜 사이클 승률! 0u → 매수 → ... → 0u 복귀 = 1 사이클<br>
  → 떨사와 동일한 방식으로 비교 가능 (실제 시드 투입/회수 1세트)<br>
  → 5년 SOXL 예상: <b>176 사이클, 승률 91%</b> (떨사 175회 / 93%와 비슷)
</div>

<div class="card">
  <div class="ct">🎯 백테 설정</div>
  <div class="ir">
    <label>종목</label>
    <input type="text" id="bt-sym" value="SOXL" placeholder="SOXL, POET, TSLA..." style="text-transform:uppercase">
    <span class="u">📊</span>
  </div>
  <div class="ir">
    <label>시작</label>
    <input type="date" id="bt-start" style="flex:1">
  </div>
  <div class="ir">
    <label>종료</label>
    <input type="date" id="bt-end" style="flex:1">
  </div>

  <div class="quick-sym">
    <button onclick="setRange('ytd')">YTD</button>
    <button onclick="setRange(1)">1년</button>
    <button onclick="setRange(2)">2년</button>
    <button onclick="setRange(3)">3년</button>
    <button onclick="setRange(5)">5년</button>
    <button onclick="setRange(10)">10년</button>
    <button onclick="setRange(20)">최대</button>
  </div>

  <div class="quick-sym" style="margin-top:12px">
    <button onclick="setSym('SOXL')">SOXL</button>
    <button onclick="setSym('TQQQ')">TQQQ</button>
    <button onclick="setSym('POET')">POET</button>
    <button onclick="setSym('UCO')">UCO</button>
    <button onclick="setSym('USO')">USO</button>
    <button onclick="setSym('TSLA')">TSLA</button>
    <button onclick="setSym('NVDA')">NVDA</button>
    <button onclick="setSym('AMD')">AMD</button>
    <button onclick="setSym('AAPL')">AAPL</button>
    <button onclick="setSym('MSFT')">MSFT</button>
    <button onclick="setSym('GOOGL')">GOOGL</button>
    <button onclick="setSym('SPY')">SPY</button>
    <button onclick="setSym('QQQ')">QQQ</button>
  </div>

<button class="btn btn-analyze" onclick="analyzeVolatility()">📊 변동성 분석 & 자동 설정!</button>
<button class="btn btn-primary" onclick="runBacktest()">🚀 백테 실행!</button>
<button class="btn" onclick="runBacktestBasic()" style="background:linear-gradient(135deg,#00c853,#00897b) !important;">🏹 기본 HUNTER로 백테! (SOXL용)</button>
<button class="btn" onclick="runVirtualSeedCompare()" style="background:linear-gradient(135deg,#fbbf24,#f97316) !important;color:#000 !important;font-weight:800">⚡ 가상 시드 비교! (+0/+5/+10/+15/+20%)</button>

  <div class="progress" id="bt-progress"></div>
</div>

<div id="vol-panel"></div>
<div id="result"></div>

<script>
function setSym(s) { document.getElementById('bt-sym').value = s; }

function setRange(years) {
  const end = new Date();
  const start = new Date();
  if (years === 'ytd') start.setMonth(0, 1);
  else if (years === 20) start.setFullYear(2015, 0, 1);
  else start.setFullYear(end.getFullYear() - years);
  const fmt = d => d.toISOString().slice(0, 10);
  document.getElementById('bt-start').value = fmt(start);
  document.getElementById('bt-end').value = fmt(end);
}

window.addEventListener('DOMContentLoaded', () => { setRange(5); });

async function analyzeVolatility() {
  const sym = document.getElementById('bt-sym').value.toUpperCase().trim();
  if (!sym) { alert('종목 입력!'); return; }
  
  const progressEl = document.getElementById('bt-progress');
  const volEl = document.getElementById('vol-panel');
  progressEl.innerHTML = '📊 1년 데이터 다운로드...';
  volEl.innerHTML = '';
  
  try {
    const end = new Date();
    const start = new Date();
    start.setFullYear(end.getFullYear() - 1);
    const fmt = d => d.toISOString().slice(0, 10);
    
    const url = `/api/history?symbol=${sym}&start=${fmt(start)}&end=${fmt(end)}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.error) { progressEl.innerHTML = '❌ ' + data.error; return; }
    if (!data.bars || data.bars.length < 30) { progressEl.innerHTML = '❌ 데이터 부족'; return; }
    
    const closes = data.bars.map(b => b.close);
    const returns = [];
    for (let i = 1; i < closes.length; i++) {
      returns.push((closes[i] - closes[i-1]) / closes[i-1] * 100);
    }
    const mean = returns.reduce((a,b) => a+b, 0) / returns.length;
    const variance = returns.reduce((s,r) => s + Math.pow(r-mean, 2), 0) / returns.length;
    const vol = Math.sqrt(variance);
    
    const params = calcParams(vol);
    const category = categorize(vol);
    
    let html = `<div class="vol-result">
      <div class="ct" style="color:#ffd">🎯 ${sym} 변동성 분석</div>
      <div class="vol-main">
        <div class="vol-num">${vol.toFixed(2)}%</div>
        <div class="vol-cat">${category.emoji} ${category.name}</div>
      </div>
      <div style="background:rgba(0,0,0,0.3);padding:12px;border-radius:10px;margin-top:10px">
        <div style="font-weight:700;margin-bottom:8px;color:#ffd">💡 추천 HUNTER 설정:</div>
        <div class="param-row"><span class="param-label">유닛</span><span class="param-value">2u / 4u / TU20 (공통)</span></div>
        <div class="param-row"><span class="param-label">매도 목표 (천/중/바)</span><span class="param-value">+${(params.top_p*100).toFixed(1)}% / +${(params.mid_p*100).toFixed(1)}% / +${(params.bot_p*100).toFixed(1)}%</span></div>
        <div class="param-row"><span class="param-label">강제 기간</span><span class="param-value">${params.top_d}일 / ${params.mid_d}일 / ${params.bot_d}일</span></div>
        <div class="param-row"><span class="param-label">Lookback</span><span class="param-value">${params.lookback}일</span></div>
      </div>
      <div style="background:rgba(255,255,100,0.1);padding:10px;border-radius:8px;margin-top:10px;font-size:12px">
        <b>💡 ${category.recommendation}</b>
      </div>
    </div>`;
    
    volEl.innerHTML = html;
    progressEl.innerHTML = '✅ 분석 완료! [🚀 백테 실행] 클릭!';
    window.autoParams = params;
  } catch(e) { progressEl.innerHTML = '❌ ' + e.message; }
}

function categorize(vol) {
  if (vol < 1.0) return { emoji: '🟢', name: '안정주', recommendation: '변동성 너무 낮음! 단순 보유 추천!' };
  if (vol < 1.5) return { emoji: '🔵', name: '지수 ETF', recommendation: 'Ultra Long HUNTER. 년 3~5회 매매!' };
  if (vol < 2.5) return { emoji: '🟣', name: '안정 성장주', recommendation: 'Long HUNTER. 월 1~2회 매매!' };
  if (vol < 4.0) return { emoji: '🟠', name: '변동 개별주', recommendation: 'Mid HUNTER. 주 1회 매매!' };
  if (vol < 6.0) return { emoji: '🔴', name: '고변동 ETF', recommendation: 'Short-Mid HUNTER!' };
  return { emoji: '🚨', name: '극변동', recommendation: '기본 HUNTER! 자동화 필수!' };
}

function calcParams(vol) {
  const top_p = vol * 0.5 / 100;
  const mid_p = vol * 0.3 / 100;
  const bot_p = vol * 0.8 / 100;
  let top_d, mid_d, bot_d, lookback;
  // 강제일 최적화 (백테 검증) - 자본 회전율 ↑
  if (vol >= 5) { top_d = 7; mid_d = 7; bot_d = 10; lookback = 20; }
  else if (vol >= 3) { top_d = 10; mid_d = 10; bot_d = 14; lookback = 30; }
  else if (vol >= 2) { top_d = 14; mid_d = 14; bot_d = 20; lookback = 40; }
  else if (vol >= 1.5) { top_d = 18; mid_d = 18; bot_d = 27; lookback = 50; }
  else { top_d = 25; mid_d = 25; bot_d = 40; lookback = 60; }
  return { top_p, mid_p, bot_p, top_d, mid_d, bot_d, lookback };
}

async function runBacktest() {
  const sym = document.getElementById('bt-sym').value.toUpperCase().trim();
  const userStartDate = document.getElementById('bt-start').value;
  const userEndDate = document.getElementById('bt-end').value;
  
  if (!sym) { alert('종목 입력!'); return; }
  if (!userStartDate || !userEndDate) { alert('날짜 선택!'); return; }
  
  const progressEl = document.getElementById('bt-progress');
  const resultEl = document.getElementById('result');
  progressEl.innerHTML = '📥 데이터 가져오는 중...';
  resultEl.innerHTML = '';
  
  try {
    let params = window.autoParams;
    let paramSource = '자동';
    let measuredVol = null;
    
    if (params && params._forced) {
      paramSource = params._forced;
      // _forced 표시는 보존하되 simulate에는 영향 X
    }
    
    if (!params) {
      const end1y = new Date(userEndDate);
      const start1y = new Date(end1y);
      start1y.setFullYear(start1y.getFullYear() - 1);
      const fmt = d => d.toISOString().slice(0, 10);
      
      const volRes = await fetch(`/api/history?symbol=${sym}&start=${fmt(start1y)}&end=${fmt(end1y)}`);
      const volData = await volRes.json();
      if (volData.error) { progressEl.innerHTML = '❌ ' + volData.error; return; }
      
      const closes1y = volData.bars.map(b => b.close);
      const rets = [];
      for (let i = 1; i < closes1y.length; i++) rets.push((closes1y[i] - closes1y[i-1]) / closes1y[i-1] * 100);
      const mean = rets.reduce((a,b) => a+b, 0) / rets.length;
      const vr = rets.reduce((s,r) => s + Math.pow(r-mean, 2), 0) / rets.length;
      const vol = Math.sqrt(vr);
      measuredVol = vol;
      params = calcParams(vol);
      paramSource = `자동(측정값 ${vol.toFixed(2)}%)`;
    }
    
    const warmupTradingDays = Math.max(params.lookback + 5, 25);
    const warmupCalendarDays = Math.ceil(warmupTradingDays * 1.6) + 10;
    const fetchStartDate = new Date(userStartDate);
    fetchStartDate.setDate(fetchStartDate.getDate() - warmupCalendarDays);
    const fmt = d => d.toISOString().slice(0, 10);
    const fetchStartStr = fmt(fetchStartDate);
    
    progressEl.innerHTML = `📥 데이터 가져오는 중...`;
    
    const res = await fetch(`/api/history?symbol=${sym}&start=${fetchStartStr}&end=${userEndDate}`);
    const data = await res.json();
    
    if (data.error) { progressEl.innerHTML = '❌ ' + data.error; return; }
    if (!data.bars || data.bars.length < 30) { progressEl.innerHTML = '❌ 데이터 부족'; return; }
    
    const userStartTs = new Date(userStartDate).getTime();
    let userStartIdx = -1;
    for (let i = 0; i < data.bars.length; i++) {
      if (new Date(data.bars[i].date).getTime() >= userStartTs) {
        userStartIdx = i;
        break;
      }
    }
    
    if (userStartIdx < 0) { progressEl.innerHTML = '❌ 시작일 데이터 없음'; return; }
    
    progressEl.innerHTML = `✅ 총 ${data.bars.length}일 (warmup ${userStartIdx}일 + 거래 ${data.bars.length - userStartIdx}일)`;
    
    const result = simulateHunter(data.bars, params, userStartIdx);
    
    const userStartPrice = data.bars[userStartIdx].close;
    const userEndPrice = data.bars[data.bars.length - 1].close;
    const buyHoldMult = userEndPrice / userStartPrice;
    const vsHold = result.mult / buyHoldMult;
    
    // 사이클 분포
    const dist = [
      { label: '+10% 이상 🌟', min: 10, max: 999, color: '#0f0' },
      { label: '+5%~+10%', min: 5, max: 10, color: '#0d8' },
      { label: '+3%~+5%', min: 3, max: 5, color: '#0c6' },
      { label: '+1%~+3%', min: 1, max: 3, color: '#0a4' },
      { label: '0%~+1%', min: 0, max: 1, color: '#066' },
      { label: '-3%~0%', min: -3, max: 0, color: '#a44' },
      { label: '-5%~-3%', min: -5, max: -3, color: '#c33' },
      { label: '-5% 이하 💀', min: -999, max: -5, color: '#f00' },
    ];
    
    const completed = result.cycles.filter(c => !c.incomplete);
    const maxCnt = Math.max(...dist.map(d => completed.filter(c => c.pnl >= d.min && c.pnl < d.max).length), 1);
    
    let distHtml = '';
    dist.forEach(d => {
      const cnt = completed.filter(c => c.pnl >= d.min && c.pnl < d.max).length;
      const pct = completed.length > 0 ? cnt / completed.length * 100 : 0;
      const barW = cnt / maxCnt * 100;
      distHtml += `<div class="cycle-dist-row">
        <div class="dist-label">${d.label}</div>
        <div class="dist-bar"><div class="dist-fill" style="width:${barW}%;background:${d.color}"></div></div>
        <div class="dist-cnt">${cnt}회 (${pct.toFixed(1)}%)</div>
      </div>`;
    });
    
    let html = `<div class="card">
      <div class="ct">📈 ${data.symbol} · ${userStartDate} ~ ${userEndDate}</div>
      
      <div class="result-grid">
        <div class="result-box hold">
          <div class="rb-label">📌 단순 보유</div>
          <div class="rb-value" style="color:${buyHoldMult>=1?'#0f0':'#f44'}">
            ${buyHoldMult>=1?'+':''}${((buyHoldMult-1)*100).toFixed(1)}%
          </div>
          <div class="rb-pct">${buyHoldMult.toFixed(2)}배</div>
        </div>
        <div class="result-box hunter">
          <div class="rb-label">🏹 HUNTER</div>
          <div class="rb-value">+${((result.mult-1)*100).toFixed(1)}%</div>
          <div class="rb-pct">${result.mult.toFixed(2)}배</div>
        </div>
      </div>
      
      <div class="metric-row">
        <span class="metric-label">HUNTER 추가 수익</span>
        <span class="metric-value" style="color:${vsHold>1?'#0f0':'#f44'};font-size:16px">
          ${vsHold>1?'+':''}${((result.mult - buyHoldMult) * 100).toFixed(1)}%p ${vsHold>1?'🚀':'📉'}
        </span>
      </div>
      <div class="metric-row">

// 🆕 가상 시드 펼침/접기 토글
function toggleVsDetail(idx) {
  const detailRow = document.getElementById('vs-detail-' + idx);
  const contentDiv = document.getElementById('vs-detail-content-' + idx);
  
  if (!detailRow || !contentDiv) return;
  
  if (detailRow.style.display === 'none') {
    if (!contentDiv.innerHTML) {
      const r = window._vsResults[idx];
      const showMonthly = window._vsShowMonthly;
      const snapshots = r.periodSnapshots;
      
      const boostLabel = r.boost === 0 ? '정상 (0%)' : '+' + (r.boost * 100).toFixed(0) + '%';
      const boostColor = r.boost === 0 ? '#888' : (r.boost === 0.05 ? '#22c55e' : (r.boost === 0.10 ? '#3b82f6' : (r.boost === 0.15 ? '#a78bfa' : '#f97316')));
      
      let detailHtml = '<div style="font-size:14px;color:' + boostColor + ';font-weight:800;margin-bottom:12px">📊 ' + boostLabel + ' - ' + (showMonthly ? '월별' : '연도별') + ' 수익률</div>';
      
      const keys = Object.keys(snapshots).filter(k => {
        if (showMonthly) return k.length === 7;
        else return k.length === 4;
      }).sort();
      
      if (keys.length === 0) {
        detailHtml += '<div style="color:#666;font-style:italic">데이터 없음</div>';
      } else {
        // 🆕 큰 글자, 수익률 + MDD만
        detailHtml += '<table style="width:100%;border-collapse:collapse;font-family:\'JetBrains Mono\',monospace;font-size:15px">';
        detailHtml += '<thead><tr style="border-bottom:2px solid #333"><th style="padding:10px 8px;text-align:left;color:#888;font-size:13px">' + (showMonthly ? '월' : '년도') + '</th><th style="padding:10px 8px;text-align:right;color:#fbbf24;font-size:13px">수익률</th><th style="padding:10px 8px;text-align:right;color:#888;font-size:13px">MDD</th></tr></thead><tbody>';
        
        for (const key of keys) {
          const snap = snapshots[key];
          const ret = (snap.end - snap.start) / snap.start * 100;
          const cls = ret >= 0 ? '#22c55e' : '#ef4444';
          
          // 🆕 해당 기간 MDD 계산 (snap에 mdd 추가 필요)
          const periodMdd = snap.mdd || 0;
          const mddCls = periodMdd < 0 ? '#ef4444' : '#888';
          
          detailHtml += '<tr style="border-bottom:1px solid #1a1a2a">';
          detailHtml += '<td style="padding:12px 8px;color:#fff;font-weight:700;font-size:15px">' + key + '</td>';
          detailHtml += '<td style="padding:12px 8px;text-align:right;font-weight:800;color:' + cls + ';font-size:18px">' + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%</td>';
          detailHtml += '<td style="padding:12px 8px;text-align:right;color:' + mddCls + ';font-size:14px">' + (periodMdd < 0 ? periodMdd.toFixed(1) + '%' : '-') + '</td>';
          detailHtml += '</tr>';
        }
        
        detailHtml += '</tbody></table>';
      }
      
      contentDiv.innerHTML = detailHtml;
    }
    detailRow.style.display = 'table-row';
  } else {
    detailRow.style.display = 'none';
  }
}

async function runVirtualSeedCompare() {
  const sym = document.getElementById('bt-sym').value.toUpperCase().trim();
  const userStartDate = document.getElementById('bt-start').value;
  const userEndDate = document.getElementById('bt-end').value;
  
  if (!sym) { alert('종목 입력!'); return; }
  if (!userStartDate || !userEndDate) { alert('날짜 선택!'); return; }
  
  const progressEl = document.getElementById('bt-progress');
  const resultEl = document.getElementById('result');
  progressEl.innerHTML = '⚡ 가상 시드 비교 백테 시작...';
  resultEl.innerHTML = '';
  
  try {
    // 기본 SOXL 룰 사용
    const params = {
      top_p: 0.025, mid_p: 0.005, bot_p: 0.03,
      top_d: 7, mid_d: 7, bot_d: 10, lookback: 20
    };
    
    // 데이터 가져오기
    const warmupCalendarDays = Math.ceil(25 * 1.6) + 10;
    const fetchStartDate = new Date(userStartDate);
    fetchStartDate.setDate(fetchStartDate.getDate() - warmupCalendarDays);
    const fmt = d => d.toISOString().slice(0, 10);
    const fetchStartStr = fmt(fetchStartDate);
    
    progressEl.innerHTML = '📥 데이터 가져오는 중...';
    
    const res = await fetch('/api/history?symbol=' + sym + '&start=' + fetchStartStr + '&end=' + userEndDate);
    const data = await res.json();
    
    if (data.error) { progressEl.innerHTML = '❌ ' + data.error; return; }
    if (!data.bars || data.bars.length < 30) { progressEl.innerHTML = '❌ 데이터 부족'; return; }
    
    const userStartTs = new Date(userStartDate).getTime();
    let userStartIdx = -1;
    for (let i = 0; i < data.bars.length; i++) {
      if (new Date(data.bars[i].date).getTime() >= userStartTs) {
        userStartIdx = i;
        break;
      }
    }
    if (userStartIdx < 0) { progressEl.innerHTML = '❌ 시작일 데이터 없음'; return; }
    
    progressEl.innerHTML = '🔥 5가지 시뮬레이션 실행 중...';
    
    // 5가지 가상 시드 비율로 시뮬레이션
    const boosts = [0, 0.05, 0.10, 0.15, 0.20];
    const results = [];
    for (const boost of boosts) {
      const r = simulateHunter(data.bars, params, userStartIdx, boost);
      results.push({ boost: boost, ...r });
    }
    
    // Buy & Hold 계산
    const userStartPrice = data.bars[userStartIdx].close;
    const userEndPrice = data.bars[data.bars.length - 1].close;
    const buyHoldMult = userEndPrice / userStartPrice;
    
    // 결과 표시
    progressEl.innerHTML = '✅ 비교 완료!';
    
    const baseResult = results[0]; // 정상 (가상 +0%)
    const baseMult = baseResult.mult;
    
    let html = '<div class="cycle-card" style="margin-top:14px"><div class="cs-title">⚡ 가상 시드 비교 결과 (' + sym + ' / 기본 SOXL 룰)</div>';
    
    // 설정 기간 표시
    const totalDaysActual = data.bars.length - userStartIdx;
    const yearsDisplay = (totalDaysActual / 252).toFixed(2);
    html += '<div style="background:#0a1a2a;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#3b82f6;font-weight:700;text-align:center">';
    html += '📅 백테 기간: ' + userStartDate + ' ~ ' + userEndDate + ' (약 ' + yearsDisplay + '년 / ' + totalDaysActual + ' 거래일)';
    html += '</div>';
    
    html += '<div style="background:#1a1a2a;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7">';
    html += '<b style="color:#fbbf24">💡 가상 시드 시스템:</b><br>';
    html += '• 0~15u: 가상 시드 풀 적용 (+X%)<br>';
    html += '• 16~17u: 절반 적용 (안전)<br>';
    html += '• 18u+: 정상 시드 (시드 부족 방지)';
    html += '</div>';
    
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-family:\'JetBrains Mono\',monospace;font-size:14px">';
    html += '<thead><tr style="border-bottom:2px solid #444"><th style="padding:12px 8px;text-align:left;color:#888;font-size:13px">가상비율</th><th style="padding:12px 8px;text-align:right;color:#fbbf24;font-size:13px">수익률</th><th style="padding:12px 8px;text-align:right;color:#888;font-size:13px">CAGR</th><th style="padding:12px 8px;text-align:right;color:#888;font-size:13px">MDD</th><th style="padding:12px 8px;text-align:right;color:#888;font-size:13px">vs정상</th></tr></thead><tbody>';
    
    const totalDays = data.bars.length - userStartIdx;
    const years = totalDays / 252;
    
    const showMonthly = years < 1.5;
    
    window._vsResults = results;
    window._vsShowMonthly = showMonthly;
    
    for (let idx = 0; idx < results.length; idx++) {
      const r = results[idx];
      const cagr = (Math.pow(r.mult, 1/years) - 1) * 100;
      const periodReturn = (r.mult - 1) * 100;
      const vsBase = r.mult / baseMult;
      const vsBasePct = ((vsBase - 1) * 100).toFixed(1);
      const boostLabel = r.boost === 0 ? '정상' : '+' + (r.boost * 100).toFixed(0) + '%';
      const boostColor = r.boost === 0 ? '#888' : (r.boost === 0.05 ? '#22c55e' : (r.boost === 0.10 ? '#3b82f6' : (r.boost === 0.15 ? '#a78bfa' : '#f97316')));
      const periodCls = periodReturn >= 0 ? '#22c55e' : '#ef4444';
      
      html += '<tr style="border-bottom:1px solid #222;cursor:pointer" onclick="toggleVsDetail(' + idx + ')">';
      html += '<td style="padding:14px 8px;color:' + boostColor + ';font-weight:800;font-size:15px">' + boostLabel + ' <span style="color:#666;font-size:11px">▼</span></td>';
      html += '<td style="padding:14px 8px;text-align:right;font-weight:800;color:' + periodCls + ';font-size:15px">' + (periodReturn >= 0 ? '+' : '') + periodReturn.toFixed(0) + '%</td>';
      html += '<td style="padding:14px 8px;text-align:right;color:#22c55e;font-size:13px">+' + cagr.toFixed(1) + '%</td>';
      html += '<td style="padding:14px 8px;text-align:right;color:#ef4444;font-size:13px">' + r.mdd.toFixed(1) + '%</td>';
      html += '<td style="padding:14px 8px;text-align:right;color:' + (vsBase > 1 ? '#22c55e' : (vsBase < 1 ? '#ef4444' : '#888')) + ';font-weight:700;font-size:14px">' + (vsBase >= 1 ? '+' : '') + vsBasePct + '%</td>';
      html += '</tr>';
      
      html += '<tr id="vs-detail-' + idx + '" style="display:none"><td colspan="5" style="padding:0;background:#0a0a14"><div id="vs-detail-content-' + idx + '" style="padding:14px"></div></td></tr>';
    }
    
    html += '</tbody></table></div>';
    
    // 추천
    let bestIdx = 0;
    let bestScore = 0;
    for (let i = 0; i < results.length; i++) {
      // 점수: 수익 - MDD 페널티
      const score = results[i].mult / baseMult - Math.abs(results[i].mdd / baseResult.mdd - 1) * 0.5;
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    
    const recommended = results[bestIdx];
    const recBoost = recommended.boost;
    const recCagr = (Math.pow(recommended.mult, 1/years) - 1) * 100;
    const recPeriod = (recommended.mult - 1) * 100;
    
    html += '<div style="background:linear-gradient(135deg,#1a1a3a,#1a3a3a);border:2px solid #fbbf24;border-radius:12px;padding:16px;margin-top:16px">';
    html += '<div style="font-size:15px;font-weight:800;color:#fbbf24;margin-bottom:8px">🏆 형님 추천: 가상 시드 ' + (recBoost === 0 ? '정상 (0%)' : '+' + (recBoost * 100).toFixed(0) + '%') + '</div>';
    html += '<div style="font-size:13px;color:#fff;line-height:1.7">';
    html += '• 누적 배수: <b>' + recommended.mult.toFixed(2) + 'x</b><br>';
    html += '• <b style="color:#fbbf24">기간 수익률 (' + yearsDisplay + '년): ' + (recPeriod >= 0 ? '+' : '') + recPeriod.toFixed(1) + '%</b><br>';
    html += '• 연환산 (CAGR): +' + recCagr.toFixed(1) + '%<br>';
    html += '• 정상 대비: <b style="color:#22c55e">+' + ((recommended.mult / baseMult - 1) * 100).toFixed(1) + '%</b><br>';
    html += '• MDD: ' + recommended.mdd.toFixed(1) + '%<br>';
    html += '• Buy&Hold (' + buyHoldMult.toFixed(2) + 'x) 대비: <b>' + (recommended.mult / buyHoldMult).toFixed(2) + '배</b>';
    html += '</div></div>';
    
    html += '<div style="margin-top:14px;font-size:12px;color:#888;line-height:1.7">';
    html += '⚠️ <b>주의:</b><br>';
    html += '• 가상 시드는 평소엔 시드 활용 ↑ (+수익)<br>';
    html += '• But 풀 포지션 도달 시 = 안전 장치 작동 (정상 시드)<br>';
    html += '• MDD 약간 ↑ 가능 (위험도)<br>';
    html += '• 형님 결정: 수익 vs 위험 균형';
    html += '</div>';
    
    html += '</div>';
    
    resultEl.innerHTML = html;
  } catch (e) {
    progressEl.innerHTML = '❌ 에러: ' + e.message;
  }
}

function simulateHunter(bars, params, userStartIdx, virtualBoost) {
  // virtualBoost: 0 (정상), 0.05 (+5%), 0.10 (+10%), 0.15 (+15%), 0.20 (+20%)
  virtualBoost = virtualBoost || 0;
  
  const closes = bars.map(b => b.close);
  const dates = bars.map(b => b.date);
  const n = closes.length;
  
  const minWarmup = Math.max(params.lookback + 5, 25);
  const warmup = Math.max(userStartIdx, minWarmup);
  
  const TU = 20;
  let cap = 100;
  let pe = [], pu = [], pd = [], zones = [];
  let pk = 100, mdd = 0;
  let nBuys = 0, nSells = 0, tierWins = 0;
  
  // 가상 시드 통계
  let totalVirtualUnits = 0;
  let normalUnits = 0;
  let safetyTriggers = 0;
  
  const cycles = [];
  let inCycle = false;
  let cycleStartCap = 100;
  let cycleStartIdx = warmup;
  
  // 🆕 연도별/월별 자본 추적
  const periodSnapshots = {}; // {'2024': {start: 100, end: 200}, '2024-03': {...}}
  let lastYear = null;
  let lastMonth = null;
  
  // 일별 자본 곡선 (총 평가 자산 = cap × 보유 가치)
  const calcTotalValue = (cl) => {
    let tv = cap;
    for (let j = 0; j < pe.length; j++) {
      tv *= (1 + (cl - pe[j]) / pe[j] * pu[j] / TU);
    }
    return tv;
  };
  
  for (let i = warmup; i < n; i++) {
    const cl = closes[i];
    const prev = closes[i-1];
    const baseUnits = cl < prev ? 4 : 2;
    
    const start = Math.max(0, i - params.lookback);
    const recentHigh = Math.max(...closes.slice(start, i+1));
    const dd = (cl - recentHigh) / recentHigh * 100;
    
    let zone;
    if (dd >= -10) zone = 'top';
    else if (dd <= -15) zone = 'bot';
    else zone = 'mid';
    
    // 🆕 연도/월 변경 감지 (시작 자본 + MDD 초기화)
    const dateStr = dates[i];
    const year = dateStr.slice(0, 4);
    const month = dateStr.slice(0, 7);
    
    if (year !== lastYear) {
      if (!periodSnapshots[year]) {
        const tv = calcTotalValue(cl);
        periodSnapshots[year] = { start: tv, end: tv, peak: tv, mdd: 0 };
      }
      lastYear = year;
    }
    if (month !== lastMonth) {
      if (!periodSnapshots[month]) {
        const tv = calcTotalValue(cl);
        periodSnapshots[month] = { start: tv, end: tv, peak: tv, mdd: 0 };
      }
      lastMonth = month;
    }
    
    // 1단계: 매도 처리
    const re = [], rd = [], ru = [], rz = [];
    for (let j = 0; j < pe.length; j++) {
      pd[j] += 1;
      const p = (cl - pe[j]) / pe[j];
      
      let tp, fd;
      if (zones[j] === 'top') { tp = params.top_p; fd = params.top_d; }
      else if (zones[j] === 'bot') { tp = params.bot_p; fd = params.bot_d; }
      else { tp = params.mid_p; fd = params.mid_d; }
      
      if (p >= tp || pd[j] >= fd) {
        cap *= (1 + p * pu[j] / TU);
        nSells++;
        if (p > 0) tierWins++;
      } else {
        re.push(pe[j]); rd.push(pd[j]); ru.push(pu[j]); rz.push(zones[j]);
      }
    }
    pe = re; pd = rd; pu = ru; zones = rz;
    
    // 2단계: 사이클 종료 체크
    if (inCycle && pe.length === 0) {
      const cyclePnl = (cap - cycleStartCap) / cycleStartCap * 100;
      cycles.push({
        startIdx: cycleStartIdx,
        endIdx: i,
        startDate: dates[cycleStartIdx],
        endDate: dates[i],
        duration: i - cycleStartIdx + 1,
        pnl: cyclePnl,
        incomplete: false
      });
      inCycle = false;
    }
    
    // 3단계: 매수 처리 (가상 시드)
    const ti = pu.reduce((s, u) => s + u, 0);
    if (ti < TU && baseUnits > 0) {
      if (!inCycle) {
        inCycle = true;
        cycleStartCap = cap;
        cycleStartIdx = i;
      }
      
      let actualUnits;
      if (virtualBoost > 0 && ti < 16) {
        actualUnits = Math.min(baseUnits * (1 + virtualBoost), TU - ti);
        totalVirtualUnits++;
      } else if (virtualBoost > 0 && ti < 18) {
        actualUnits = Math.min(baseUnits * (1 + virtualBoost * 0.5), TU - ti);
        normalUnits++;
      } else {
        actualUnits = Math.min(baseUnits, TU - ti);
        if (virtualBoost > 0) safetyTriggers++;
      }
      
      pe.push(cl); pd.push(0); pu.push(actualUnits); zones.push(zone);
      nBuys++;
    }
    
    // 🆕 매일 마지막 자본 갱신 + 기간별 MDD 추적
    const tv = calcTotalValue(cl);
    if (periodSnapshots[year]) {
      periodSnapshots[year].end = tv;
      if (tv > periodSnapshots[year].peak) periodSnapshots[year].peak = tv;
      const yearDd = (tv - periodSnapshots[year].peak) / periodSnapshots[year].peak * 100;
      if (yearDd < periodSnapshots[year].mdd) periodSnapshots[year].mdd = yearDd;
    }
    if (periodSnapshots[month]) {
      periodSnapshots[month].end = tv;
      if (tv > periodSnapshots[month].peak) periodSnapshots[month].peak = tv;
      const monthDd = (tv - periodSnapshots[month].peak) / periodSnapshots[month].peak * 100;
      if (monthDd < periodSnapshots[month].mdd) periodSnapshots[month].mdd = monthDd;
    }
    
    // MDD
    if (tv > pk) pk = tv;
    const ddv = (tv - pk) / pk * 100;
    if (ddv < mdd) mdd = ddv;
  }
  
  // 최종 평가
  let final = cap;
  const lastClose = closes[n-1];
  for (let j = 0; j < pe.length; j++) {
    final *= (1 + (lastClose - pe[j]) / pe[j] * pu[j] / TU);
  }
  
  // 진행 중인 사이클
  let incompleteCount = 0;
  if (inCycle) {
    incompleteCount = 1;
    cycles.push({
      startIdx: cycleStartIdx,
      endIdx: n-1,
      startDate: dates[cycleStartIdx],
      endDate: dates[n-1],
      duration: n - cycleStartIdx,
      pnl: (final - cycleStartCap) / cycleStartCap * 100,
      incomplete: true
    });
  }
  
  // 통계 (완료 사이클만)
  const completed = cycles.filter(c => !c.incomplete);
  const cycleWins = completed.filter(c => c.pnl > 0).length;
  const cycleLosses = completed.length - cycleWins;
  const cycleWinRate = completed.length > 0 ? cycleWins / completed.length * 100 : 0;
  const avgCyclePnl = completed.length > 0 ? completed.reduce((s,c) => s+c.pnl, 0) / completed.length : 0;
  
  const durations = completed.map(c => c.duration);
  const avgCycleDuration = durations.length > 0 ? durations.reduce((s,d) => s+d, 0) / durations.length : 0;
  const sortedDur = [...durations].sort((a,b) => a-b);
  const medianCycleDuration = sortedDur.length > 0 ? sortedDur[Math.floor(sortedDur.length / 2)] : 0;
  
  let bestCycle = null, worstCycle = null;
  if (completed.length > 0) {
    bestCycle = completed.reduce((best, c) => c.pnl > best.pnl ? c : best);
    worstCycle = completed.reduce((worst, c) => c.pnl < worst.pnl ? c : worst);
  }
  
  return {
    mult: final / 100,
    mdd: mdd,
    nBuys: nBuys,
    nSells: nSells,
    tierWins: tierWins,
    tierWinRate: nSells > 0 ? tierWins / nSells * 100 : 0,
    cycles: cycles,
    completedCycles: completed,
    periodSnapshots: periodSnapshots,
    cycleTotal: cycles.length,
    cycleWins: cycleWins,
    cycleLosses: cycleLosses,
    cycleWinRate: cycleWinRate,
    avgCyclePnl: avgCyclePnl,
    avgCycleDuration: avgCycleDuration,
    medianCycleDuration: medianCycleDuration,
    bestCycle: bestCycle,
    worstCycle: worstCycle,
    incompleteCount: incompleteCount
  };
}
